                  <div><Label>Country</Label><TxtInp value={rpCountry} onChange={setRpCountry} placeholder="e.g. Saudi Arabia"/></div>
                  <div><Label>Plant / Facility</Label><TxtInp value={rpPlant} onChange={setRpPlant} placeholder="e.g. Ras Tanura Refinery"/></div>
                  <div><Label>Vessel Tag / ID</Label><TxtInp value={rpVessel} onChange={setRpVessel} placeholder="e.g. R-101"/></div>
                  <div><Label>Loading Date</Label>
                    <input type="date" value={rpDate} onChange={e=>setRpDate(e.target.value)}
                      style={{width:"100%",background:C.panel,border:`1px solid ${C.border}`,borderRadius:7,color:C.text,fontSize:14,fontFamily:"inherit",padding:"9px 12px",outline:"none"}}
                      onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
                  </div>
                  <div><Label>Prepared By</Label><TxtInp value={rpPreparedBy} onChange={setRpPreparedBy} placeholder="Engineer name / company"/></div>
                </div>
              </Card>

              <Card>
                <STitle color={C.purple}>Report Preview</STitle>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {[
                    ["Customer",rpCustomer||"[not set]"],
                    ["Country",rpCountry||"[not set]"],
                    ["Plant",rpPlant||"[not set]"],
                    ["Vessel",rpVessel||"[not set]"],
                    ["Date",rpDate?new Date(rpDate+"T12:00:00").toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"}):"[not set]"],
                    ["Prepared By",rpPreparedBy||"[not set]"],
                    ["Loading Method",loadMethod==="freefill"?"Free Fall":loadMethod==="sock"?"Sock Loading":"Dense Phase Loading"],
                    ["Container Type",container==="drum"?"55-gal Drum":"Supersack / Bag"],
                    ["Vessel Diameter",shellID?`${shellID} ${U.len}`:"[not set]"],
                    ["Usable Volume",usableV>0?`${fmt(fV(usableV))} ${U.vol}`:"[not set]"],
                    ["Total Layers",String(layers.length)],
                    ["Total Target Height",totalTarget>0?`${fmt(totalTarget)} ${U.len}`:"[not set]"],
                    ["Est. Total Containers",totalEstContainers>0?fmtI(totalEstContainers):"[not set]"],
                    ["Materials Defined",String(allMaterials.filter(m=>m.name.trim()&&nv(m.density)>0).length)],
                  ].map(([lbl,val])=>(
                    <div key={lbl} style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"5px 0",borderBottom:"1px solid #0a1626"}}>
                      <span style={{fontSize:11,color:C.muted}}>{lbl}</span>
                      <span style={{fontSize:12,fontWeight:600,color:val.startsWith("[")?C.dim:C.text}}>{val}</span>
                    </div>
                  ))}
                </div>

                <div style={{marginTop:20,display:"flex",flexDirection:"column",gap:10}}>
                  <button onClick={()=>exportReportPDF({customer:rpCustomer,country:rpCountry,plant:rpPlant,vessel:rpVessel,date:rpDate?new Date(rpDate+"T12:00:00").toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"}):"",preparedBy:rpPreparedBy,loadMethod,catalysts,icbs,layers,units,container,shellID,shellH,topHead,botHead,hasBasket,basketOD,basketH,grossV,usableV,getMat,layerContainerEst,toRho,toKg,fRho,fM,fKg,fV,U,fmt,fmtI})}
                    style={{width:"100%",background:C.green,border:"none",borderRadius:8,color:"#060f1e",fontWeight:800,fontSize:13,fontFamily:"inherit",padding:"12px 0",cursor:"pointer"}}>
                    ↓ Export Loading Report PDF
                  </button>
                  <button onClick={()=>exportDiagramPDF(layers,catalysts,icbs,units,container,xs,toRho,toKg,fRho,fM,fKg,U,getMat,layerContainerEst,fmtI,fmt)}
                    style={{width:"100%",background:"transparent",border:`1px solid ${C.accent}`,borderRadius:8,color:C.accent,fontWeight:700,fontSize:13,fontFamily:"inherit",padding:"12px 0",cursor:"pointer"}}>
                    ↓ Export Diagram PDF
                  </button>
                </div>

                <div style={{marginTop:16,fontSize:10,color:C.dim,lineHeight:1.5}}>
                  Both exports download as <strong>.html files</strong> you can open in any browser and print to PDF. All data stays on your device — nothing is sent to a server.
                </div>

                <Divider/>
                <STitle color={C.teal}>📱 Use on Phone / Share with Coworkers</STitle>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {[
                    {
                      title:"Open on your phone",
                      body:"Go to claude.ai in your phone's browser and open this same conversation. The app runs fully in the browser — no install needed. Works on iPhone Safari and Android Chrome."
                    },
                    {
                      title:"Share with a coworker",
                      body:"The easiest way: share the Claude.ai conversation link. Or copy the exported .jsx file and have them open it in the Claude artifact viewer. Alternatively, drop the .html export into a shared folder (Google Drive, Dropbox, Teams) — they can open it in any browser."
                    },
                    {
                      title:"Save as a standalone web app (advanced)",
                      body:"Download the .jsx file from this chat → paste it into stackblitz.com or codesandbox.io → share the live URL. Anyone with the link can use the full app, no Claude account needed."
                    },
                    {
                      title:"Add to phone home screen",
                      body:"Open Claude.ai on your phone → navigate to this conversation → tap Share → 'Add to Home Screen'. It will behave like an app icon and open directly to this tool."
                    },
                  ].map(({title,body})=>(
                    <div key={title} style={{background:C.panel,borderRadius:9,padding:"11px 14px",borderLeft:`3px solid ${C.teal}`}}>
                      <div style={{fontSize:12,fontWeight:700,color:C.teal,marginBottom:4}}>{title}</div>
                      <div style={{fontSize:11,color:C.muted,lineHeight:1.55}}>{body}</div>
                    </div>
                  ))}
                </div>
                <div style={{marginTop:8,fontSize:10,color:C.dim,lineHeight:1.5}}>Exports download as .html files — open in any browser and use File → Print → Save as PDF.</div>
              </Card>
            </div>
          )}


          {/* ══ DENSE LOADING ══ */}
          {tab==="dense"&&(()=>{
            // Dense loading tracker — one session per catalyst layer
            // Each session has: material, target density, check interval, and a log of measurement rows
            // Each row: container# at check, cumulative mass loaded into that layer, measured outage, calculated density, variance, RPM recommendation
            const sess=dSessions[activeSession>=0&&activeSession<dSessions.length?activeSession:0];
            const sIdx=activeSession>=0&&activeSession<dSessions.length?activeSession:0;
            const mat=getMat(sess?.materialId);
            const tgtRhoSI=sess?toRho(sess.targetDensity||mat?.density||""):0;

            // Session material container weight (kg)
            const sessContWtKg=mat?toKg(container==="drum"?mat.drumWt:mat.bagWt):0;

            const checkResults=(sess?.checks||[]).map(chk=>{
              // Simple: mass = containers loaded × kg per container (from material registry)
              //         vol  = vessel cross-section × measured layer thickness
              //         ρ    = mass / vol
              const nConts=nv(chk.containersLoaded);
              const thickM=toM(chk.layerThick);
              const massKg=nConts>0&&sessContWtKg>0?nConts*sessContWtKg:null;
              const layVol=thickM>0&&xs>0?xs*thickM:null;
              const calcRho=massKg&&layVol&&massKg>0&&layVol>0?massKg/layVol:null;
              const varPct=calcRho&&tgtRhoSI>0?((calcRho-tgtRhoSI)/tgtRhoSI*100):null;
              let rec="—", recColor=C.muted, rpmAdj="";
              if(varPct!=null){
                const abs=Math.abs(varPct);
                if(abs<2){rec="On target";recColor=C.green;rpmAdj="Maintain RPM";}
                else if(varPct<-10){rec="Way too low";recColor=C.red;rpmAdj="↑ RPM ~10%";}
                else if(varPct<-5){rec="Too low";recColor=C.amber;rpmAdj="↑ RPM ~5%";}
                else if(varPct<-2){rec="Slightly low";recColor="#fde68a";rpmAdj="↑ RPM 2–3%";}
                else if(varPct>10){rec="Way too high";recColor=C.red;rpmAdj="↓ RPM ~10%";}
                else if(varPct>5){rec="Too high";recColor=C.amber;rpmAdj="↓ RPM ~5%";}
                else{rec="Slightly high";recColor="#fde68a";rpmAdj="↓ RPM 2–3%";}
              }
              return{...chk,nConts,thickM,massKg,calcRho,varPct,rec,recColor,rpmAdj};
            });

            const lastCheck=checkResults.filter(r=>r.calcRho!=null).slice(-1)[0]||null;
            const latestRho=lastCheck?.calcRho||null;
            const latestVar=lastCheck?.varPct||null;

            return(
              <div style={{display:"flex",flexDirection:"column",gap:16}}>

                {/* top: session tabs + config inline */}
                <Card>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                    <STitle color={C.purple}>Dense Loading Tracker</STitle>
                    <button onClick={()=>{setDSessions(s=>[...s,newDSession()]);setActiveSession(dSessions.length);}}
                      style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:7,color:C.muted,fontFamily:"inherit",fontSize:11,fontWeight:600,padding:"6px 12px",cursor:"pointer",whiteSpace:"nowrap"}}>
                      + Add Layer Session
                    </button>
                  </div>

                  {/* session tab bar */}
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
                    {dSessions.map((s,i)=>{
                      const sMat=getMat(s.materialId);
                      const sMat2=getMat(s.materialId);
                      const sWt=sMat2?toKg(container==="drum"?sMat2.drumWt:sMat2.bagWt):0;
                      const sChecks=s.checks.filter(c=>nv(c.containersLoaded)>0&&nv(c.layerThick)>0);
                      const lastC=sChecks.slice(-1)[0];
                      const lastRho=lastC&&sWt>0&&xs>0?(()=>{
                        const mKg=nv(lastC.containersLoaded)*sWt;
                        const lV=xs*toM(lastC.layerThick);
                        return mKg>0&&lV>0?mKg/lV:null;
                      })():null;
                      const sTgt=toRho(s.targetDensity||sMat?.density||"");
                      const sVar=lastRho&&sTgt>0?((lastRho-sTgt)/sTgt*100):null;
                      const sOk=sVar!=null&&Math.abs(sVar)<2;
                      const sWarn=sVar!=null&&!sOk&&Math.abs(sVar)<6;
                      return(
                        <button key={s.id} onClick={()=>setActiveSession(i)} style={{
                          background:i===sIdx?"#1e3a5f":"transparent",
                          border:`1.5px solid ${i===sIdx?C.accent:C.border}`,
                          borderRadius:8,padding:"8px 14px",cursor:"pointer",fontFamily:"inherit",
                          display:"flex",flexDirection:"column",alignItems:"flex-start",gap:2,minWidth:130}}>
                          <span style={{fontSize:12,fontWeight:700,color:i===sIdx?C.accent:C.muted}}>{s.name||`Session ${i+1}`}</span>
                          <span style={{fontSize:10,color:C.dim}}>{sMat?.name||"no material"} · {s.checks.length} checks</span>
                          {sVar!=null&&<span style={{fontSize:10,fontWeight:700,color:sOk?C.green:sWarn?C.amber:C.red}}>{sVar>0?"+":""}{sVar.toFixed(1)}% vs target</span>}
                        </button>
                      );
                    })}
                  </div>

                  {/* session config row */}
                  {sess&&(
                    <div style={{display:"grid",gridTemplateColumns:"2fr 1.5fr 1.5fr 1fr",gap:12,padding:"14px 0 0",borderTop:`1px solid ${C.border}`}}>
                      <div>
                        <Label>Layer / Session Name</Label>
                        <TxtInp value={sess.name} onChange={v=>updDSession(sIdx,"name",v)} placeholder="e.g. Catalyst Bed 1"/>
                      </div>
                      <div>
                        <Label>Catalyst Material</Label>
                        <Sel value={sess.materialId} onChange={v=>updDSession(sIdx,"materialId",v)}>
                          <option value="">— Select —</option>
                          {activeCats.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
                          {activeIcbs.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
                        </Sel>
                        {mat&&nv(mat.density)>0&&<Hint>Registered: {fmt(fRho(toRho(mat.density)))} {U.dens}</Hint>}
                      </div>
                      <div>
                        <Label>Target Density ({U.dens})</Label>
                        <TInp value={sess.targetDensity} onChange={v=>updDSession(sIdx,"targetDensity",v)}
                          placeholder={mat&&nv(mat.density)>0?fmt(fRho(toRho(mat.density)),0):"e.g. 800"}/>
                        <Hint>From vendor data sheet</Hint>
                      </div>
                      <div>
                        <Label>Check Every</Label>
                        <TInp value={sess.checkEvery} onChange={v=>updDSession(sIdx,"checkEvery",v)} placeholder="10" unit={container+"s"}/>
                      </div>
                    </div>
                  )}
                </Card>

                {/* live status banner */}
                {tgtRhoSI>0&&latestRho!=null&&(()=>{
                  const ok=Math.abs(latestVar)<2;
                  const warn=!ok&&Math.abs(latestVar)<6;
                  return(
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:12}}>
                      {[
                        ["Latest Density",`${fmt(fRho(latestRho),0)} ${U.dens}`,ok?C.green:warn?C.amber:C.red],
                        ["Target Density",`${fmt(fRho(tgtRhoSI),0)} ${U.dens}`,C.text],
                        ["Variance",`${latestVar>0?"+":""}${latestVar.toFixed(1)}%`,ok?C.green:warn?C.amber:C.red],
                        ["RPM Adjustment",lastCheck?.rpmAdj||"—",ok?C.green:warn?C.amber:C.red],
                      ].map(([lbl,val,col])=>(
                        <div key={lbl} style={{background:ok?"#0a2d1e":warn?"#1c1000":"#1c0a0a",
                          border:`1px solid ${ok?C.green:warn?C.amber:C.red}`,borderRadius:10,padding:"12px 14px"}}>
                          <div style={{fontSize:9,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:C.muted,marginBottom:6}}>{lbl}</div>
                          <div style={{fontSize:20,fontWeight:800,color:col,lineHeight:1}}>{val}</div>
                        </div>
                      ))}
                    </div>
                  );
                })()}

                {/* main check log table */}
                {sess&&(
                  <Card>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                      <STitle color={C.purple}>Check Log — {sess.name}</STitle>
                      <button onClick={()=>addDCheck(sIdx)} style={{background:C.accent,border:"none",borderRadius:7,color:"#060f1e",fontWeight:700,fontSize:11,fontFamily:"inherit",padding:"7px 16px",cursor:"pointer"}}>
                        + Add Check
                      </button>
                    </div>

                    {/* column headers */}
                    <div style={{display:"grid",gridTemplateColumns:"100px 110px 110px 110px 80px 80px 130px 36px",gap:8,padding:"8px 10px",background:C.panel,borderRadius:"6px 6px 0 0",borderBottom:`2px solid ${C.border}`}}>
                      {[
                        `${container}s loaded`,
                        `Auto mass (${U.mass})`,
                        `Layer thickness (${U.len})`,
                        `Calc density (${U.dens})`,
                        `vs target`,
                        `Current RPM`,
                        `Recommendation`,
                        ``
                      ].map((h,i)=>(
                        <div key={i} style={{fontSize:9,fontWeight:700,color:C.dim,letterSpacing:"0.06em",textTransform:"uppercase",lineHeight:1.3}}>{h}</div>
                      ))}
                    </div>

                    {sess.checks.length===0&&(
                      <div style={{padding:"24px 0",textAlign:"center",color:C.dim,fontSize:12}}>
                        No checks yet. Click "+ Add Check" every ~{sess.checkEvery||10} {container}s, then enter the number loaded and measured layer thickness.
                      </div>
                    )}

                    <div style={{display:"flex",flexDirection:"column"}}>
                      {checkResults.map((chk,ci)=>{
                        const ok=chk.varPct!=null&&Math.abs(chk.varPct)<2;
                        const warn=chk.varPct!=null&&!ok&&Math.abs(chk.varPct)<6;
                        const rowBg=ci%2===0?C.panel:"#0a1525";
                        return(
                          <div key={chk.id} style={{display:"grid",gridTemplateColumns:"100px 110px 110px 110px 80px 80px 130px 36px",gap:8,padding:"9px 10px",background:rowBg,borderBottom:`1px solid ${C.border}`,alignItems:"center"}}>
                            {/* containers loaded at this check */}
                            <TInp small value={chk.containersLoaded} onChange={v=>updDCheck(sIdx,chk.id,"containersLoaded",v)}
                              placeholder={`# ${container}s`}/>
                            {/* auto-calculated mass — read only */}
                            <div style={{background:"#070f1c",border:`1px solid ${C.border}`,borderRadius:7,padding:"6px 10px",fontSize:12,color:sessContWtKg>0&&nv(chk.containersLoaded)>0?C.text:C.dim}}>
                              {sessContWtKg>0&&nv(chk.containersLoaded)>0
                                ?`${fmt(fKg(nv(chk.containersLoaded)*sessContWtKg),0)} ${U.mass}`
                                :<span style={{fontSize:10}}>enter {container}s</span>}
                            </div>
                            {/* measured layer thickness */}
                            <TInp small value={chk.layerThick} onChange={v=>updDCheck(sIdx,chk.id,"layerThick",v)}
                              placeholder={units==="si"?"e.g. 0.50":"e.g. 1.6"} unit={U.len}/>
                            {/* calculated density */}
                            <div style={{background:chk.calcRho!=null?`${ok?"#0a2d1e":warn?"#1c1000":"#1c0a0a"}`:"#070f1c",
                              border:`1px solid ${chk.calcRho!=null?(ok?C.green:warn?C.amber:C.red):C.border}`,
                              borderRadius:7,padding:"6px 8px",textAlign:"center"}}>
                              {chk.calcRho!=null?(
                                <div>
                                  <div style={{fontSize:14,fontWeight:800,color:ok?C.green:warn?C.amber:C.red,lineHeight:1}}>
                                    {fmt(fRho(chk.calcRho),0)}
                                  </div>
                                  <div style={{fontSize:9,color:C.dim,marginTop:1}}>{U.dens}</div>
                                </div>
                              ):<div style={{fontSize:10,color:C.dim}}>need thickness</div>}
                            </div>
                            {/* variance */}
                            <div style={{textAlign:"center"}}>
                              {chk.varPct!=null?(
                                <div style={{fontSize:13,fontWeight:800,color:ok?C.green:warn?C.amber:C.red}}>
                                  {chk.varPct>0?"+":""}{chk.varPct.toFixed(1)}%
                                </div>
                              ):<div style={{color:C.dim,fontSize:11}}>—</div>}
                            </div>
                            {/* current RPM */}
                            <TInp small value={chk.rpm} onChange={v=>updDCheck(sIdx,chk.id,"rpm",v)} placeholder="RPM"/>
                            {/* recommendation */}
                            <div style={{lineHeight:1.3}}>
                              {chk.rpmAdj?<div style={{fontSize:12,fontWeight:800,color:chk.recColor||C.muted,marginBottom:2}}>{chk.rpmAdj}</div>:null}
                              <div style={{fontSize:10,color:chk.recColor||C.dim}}>{chk.rec}</div>
                            </div>
                            {/* delete */}
                            <button onClick={()=>removeDCheck(sIdx,chk.id)} style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:16,padding:0,lineHeight:1,textAlign:"center"}}>×</button>
                          </div>
                        );
                      })}
                    </div>


                  </Card>
                )}

                {/* density trend chart */}
                {checkResults.filter(r=>r.calcRho!=null).length>1&&(()=>{
                  const pts=checkResults.filter(r=>r.calcRho!=null);
                  const vals=pts.map(r=>r.calcRho);
                  const maxRho=Math.max(...vals,tgtRhoSI||0)*1.06;
                  const minRho=Math.min(...vals,tgtRhoSI||0)*0.94;
                  const W=600,H=140,padL=48,padR=20,padT=16,padB=24;
                  const toX=i=>padL+(i/(pts.length-1))*(W-padL-padR);
                  const toY=v=>padT+((maxRho-v)/(maxRho-minRho))*(H-padT-padB);
                  const tgtY=tgtRhoSI>0?toY(tgtRhoSI):null;
                  const polyPts=pts.map((r,i)=>`${toX(i)},${toY(r.calcRho)}`).join(" ");
                  return(
                    <Card>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                        <STitle color={C.purple}>Density Trend — {sess?.name}</STitle>
                        <div style={{display:"flex",gap:14,fontSize:10,color:C.muted}}>
                          <span><span style={{color:C.green}}>— —</span> Target</span>
                          <span><span style={{color:C.amber}}>···</span> ±5%</span>
                          <span><span style={{color:C.purple}}>——</span> Measured</span>
                        </div>
                      </div>
                      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
                        {/* grid lines */}
                        {[0,0.25,0.5,0.75,1].map(f=>{
                          const yy=padT+(H-padT-padB)*f;
                          const val=maxRho-(maxRho-minRho)*f;
                          return(
                            <g key={f}>
                              <line x1={padL} x2={W-padR} y1={yy} y2={yy} stroke={C.border} strokeWidth={0.5}/>
                              <text x={padL-4} y={yy+3} fontSize={8} fill={C.dim} textAnchor="end">{fmt(fRho(val),0)}</text>
                            </g>
                          );
                        })}
                        {/* ±5% bands */}
                        {tgtY!=null&&tgtRhoSI>0&&<>
                          <line x1={padL} x2={W-padR} y1={toY(tgtRhoSI*1.05)} y2={toY(tgtRhoSI*1.05)} stroke={C.amber} strokeWidth={1} strokeDasharray="4,3" opacity={0.7}/>
                          <line x1={padL} x2={W-padR} y1={toY(tgtRhoSI*0.95)} y2={toY(tgtRhoSI*0.95)} stroke={C.amber} strokeWidth={1} strokeDasharray="4,3" opacity={0.7}/>
                          <rect x={padL} y={toY(tgtRhoSI*1.05)} width={W-padL-padR} height={toY(tgtRhoSI*0.95)-toY(tgtRhoSI*1.05)} fill={`${C.amber}08`}/>
                          <line x1={padL} x2={W-padR} y1={tgtY} y2={tgtY} stroke={C.green} strokeWidth={1.5} strokeDasharray="8,4"/>
                          <text x={W-padR+4} y={tgtY+4} fontSize={8} fill={C.green}>Target</text>
                        </>}
                        {/* area fill under line */}
                        <polygon points={`${polyPts} ${toX(pts.length-1)},${H-padB} ${toX(0)},${H-padB}`} fill={`${C.purple}15`}/>
                        {/* line */}
                        <polyline points={polyPts} fill="none" stroke={C.purple} strokeWidth={2.5}/>
                        {/* data points */}
                        {pts.map((r,i)=>{
                          const ok2=Math.abs(r.varPct)<2;
                          const w2=!ok2&&Math.abs(r.varPct)<6;
                          return(
                            <g key={i}>
                              <circle cx={toX(i)} cy={toY(r.calcRho)} r={5} fill={ok2?C.green:w2?C.amber:C.red} stroke="#060f1e" strokeWidth={1.5}/>
                              <text x={toX(i)} y={H-padB+12} fontSize={8} fill={C.muted} textAnchor="middle">
                                {`Check ${i+1}${r.nConts>0?` (#${r.nConts} ${container}s)`:''}`}
                              </text>
                              <text x={toX(i)} y={toY(r.calcRho)-8} fontSize={8} fill={ok2?C.green:w2?C.amber:C.red} textAnchor="middle" fontWeight={700}>
                                {fmt(fRho(r.calcRho),0)}
                              </text>
                            </g>
                          );
                        })}
                        <text x={12} y={(H-padT)/2+padT} fontSize={8} fill={C.dim} textAnchor="middle" transform={`rotate(-90,12,${(H-padT)/2+padT})`}>{U.dens}</text>
                      </svg>
                    </Card>
                  );
                })()}

              </div>
            );
          })()}

          {/* ══ CHECKLIST ══ */}
          {tab==="check"&&(
            <div style={{display:"flex",flexDirection:"column",gap:14,maxWidth:640}}>
              <Card style={{border:`1px solid ${clPct===100?"#166534":C.border}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{fontSize:13,fontWeight:700,color:clPct===100?"#4ade80":C.text}}>{clPct===100?"✓  Ready to Load":"Pre-Loading Readiness"}</div>
                  <div style={{display:"flex",gap:10,alignItems:"center"}}>
                    <span style={{fontSize:14,fontWeight:800,color:clPct===100?"#4ade80":C.accent}}>{clPct}%</span>
                    <button onClick={()=>setChecked({})} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,color:C.muted,cursor:"pointer",fontSize:10,fontFamily:"inherit",padding:"4px 10px",fontWeight:600}}>RESET</button>
                  </div>
                </div>
                <div style={{height:5,background:C.panel,borderRadius:999,overflow:"hidden"}}>
                  <div style={{height:"100%",borderRadius:999,width:`${clPct}%`,background:clPct===100?"#22c55e":`linear-gradient(90deg,${C.accent},#0ea5e9)`,transition:"width 0.3s"}}/>
                </div>
                <div style={{fontSize:11,color:C.dim,marginTop:8}}>{clDone} of {CL_ITEMS.length} items confirmed</div>
              </Card>
              {CL_GROUPS.map(group=>{
                const items=CL_ITEMS.filter(i=>i.g===group);
                const done=items.filter(i=>checked[i.id]).length;
                return(
                  <Card key={group} style={{padding:0,overflow:"hidden"}}>
                    <div style={{padding:"11px 16px",borderBottom:"1px solid #0a1626",display:"flex",justifyContent:"space-between",alignItems:"center",background:"#0a1829"}}>
                      <span style={{fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:C.accent}}>{group}</span>
                      <span style={{fontSize:11,color:done===items.length?"#4ade80":C.muted,fontWeight:600}}>{done}/{items.length}</span>
                    </div>
                    {items.map((item,idx)=>{
                      const isDone=!!checked[item.id];
                      return(
                        <div key={item.id} className="hrow" onClick={()=>setChecked(c=>({...c,[item.id]:!c[item.id]}))}
                          style={{display:"flex",alignItems:"flex-start",gap:12,padding:"12px 16px",cursor:"pointer",borderBottom:idx<items.length-1?"1px solid #0a1626":"none",background:isDone?"rgba(56,189,248,0.04)":"transparent",transition:"background 0.1s"}}>
                          <div style={{width:19,height:19,borderRadius:5,flexShrink:0,marginTop:1,border:`2px solid ${isDone?C.accent:C.border}`,background:isDone?C.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}}>
                            {isDone&&<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="#060f1e" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                          </div>
                          <span style={{fontSize:13,lineHeight:1.55,color:isDone?"#253d5b":C.text,textDecoration:isDone?"line-through":"none",transition:"all 0.15s"}}>{item.t}</span>
                        </div>
                      );
                    })}
                  </Card>
                );
              })}
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

const domRoot=ReactDOM.createRoot(document.getElementById('root'));
domRoot.render(React.createElement(App,null));
</script></body></html>
