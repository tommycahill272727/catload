<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CatLoad — Catalyst Loading Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0;}html,body,#root{height:100%;}body{background:#060f1e;color:#e2e8f0;font-family:'Sora','Segoe UI',sans-serif;font-size:14px;}input,select,button{font-family:'Sora','Segoe UI',sans-serif;}input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}input::placeholder{color:#253d5b;}select option{background:#0d1829;}::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:4px;}button,select,input{-webkit-tap-highlight-color:transparent;}.hrow:hover{background:#0d1829!important;}.lcard:hover .dh{opacity:1!important;}</style>
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useMemo, useRef } = React;

/* ─── constants ──────────────────────────────────── */
const LB_PER_KG  = 2.20462;
const FT3_PER_M3 = 35.3147;
const IN_PER_M   = 39.3701;

/* ─── math ───────────────────────────────────────── */
const nv   = v => parseFloat(v) || 0;
const safe = v => (v == null || isNaN(v) || !isFinite(v)) ? null : v;
const fmt  = (v, d=2) => safe(v)==null ? "—" : v.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtI = v => safe(v)==null ? "—" : Math.ceil(v).toLocaleString("en-US");
const XS   = D => Math.PI*(D/2)**2;
const cylV = (D,H) => XS(D)*H;
function headVol(type,D){
  if(!D||D<=0) return 0;
  switch(type){
    case"ellipsoidal":   return Math.PI*D**3/24;
    case"hemispherical": return(2/3)*Math.PI*(D/2)**3;
    case"fd":            return 0.0847*D**3;
    default: return 0;
  }
}

/* ─── tokens ─────────────────────────────────────── */
const C={bg:"#060f1e",panel:"#0d1829",card:"#111f35",border:"#1e3a5f",
  accent:"#38bdf8",amber:"#f59e0b",green:"#34d399",red:"#f87171",
  purple:"#a78bfa",text:"#e2e8f0",muted:"#475569",dim:"#253d5b",teal:"#2dd4bf"};
const LC={icb:"#38bdf8",catalyst:"#a78bfa",inert:"#f59e0b",support:"#34d399"};
const LL={icb:"ICB / Inert Ball",catalyst:"Catalyst Bed",inert:"Inert Top Layer",support:"Support Grading"};

/* ─── defaults ───────────────────────────────────── */
const makeCat=i=>({id:`cat${i}`,kind:"catalyst",name:`Catalyst ${i}`,density:"",drumWt:"",bagWt:""});
const makeIcb=i=>({id:`icb${i}`,kind:"icb",name:`ICB ${i}`,density:"",drumWt:"",bagWt:""});
let _lid=100;
let _dsid=200;
let _dchkid=300;
let _soId=500;
const newLayer=(type="catalyst")=>({
  id:_lid++,type,name:LL[type],materialId:"",
  targetThick:"",actualThick:"",targetDensity:"",actualDensity:"",
  estContainers:null,actualContainers:"",
  finalOutage:"",          // final outage for this layer (from top tangent)
  subOutages:[],           // [{id,drums,outage}] — interim measurements
});

/* ─── UI primitives ──────────────────────────────── */
const Label=({children,style})=>(
  <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.12em",color:C.muted,textTransform:"uppercase",marginBottom:5,...style}}>{children}</div>
);
const Hint=({children})=>(
  <div style={{fontSize:10,color:C.dim,marginTop:4,lineHeight:1.45}}>{children}</div>
);
const STitle=({children,color})=>(
  <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:color||C.accent,marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
    <div style={{width:3,height:13,background:color||C.accent,borderRadius:2,flexShrink:0}}/>
    {children}
  </div>
);
const Card=({children,style})=>(
  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:18,...style}}>{children}</div>
);
const TInp=({value,onChange,placeholder,unit,disabled,small})=>(
  <div style={{position:"relative"}}>
    <input type="number" value={value} onChange={e=>onChange(e.target.value)}
      placeholder={placeholder||""} disabled={disabled}
      style={{width:"100%",background:disabled?"#070f1c":C.panel,border:`1px solid ${C.border}`,borderRadius:7,
        color:disabled?C.dim:C.text,fontSize:small?12:14,fontFamily:"inherit",
        padding:unit?(small?"6px 40px 6px 10px":"9px 44px 9px 12px"):(small?"6px 10px":"9px 12px"),
        outline:"none",transition:"border-color 0.15s"}}
      onFocus={e=>{if(!disabled)e.target.style.borderColor=C.accent}}
      onBlur={e=>e.target.style.borderColor=C.border}/>
    {unit&&<span style={{position:"absolute",right:9,top:"50%",transform:"translateY(-50%)",fontSize:10,color:C.dim,pointerEvents:"none"}}>{unit}</span>}
  </div>
);
const TxtInp=({value,onChange,placeholder,small})=>(
  <input type="text" value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder||""}
    style={{width:"100%",background:C.panel,border:`1px solid ${C.border}`,borderRadius:7,
      color:C.text,fontSize:small?12:14,fontFamily:"inherit",
      padding:small?"6px 10px":"9px 12px",outline:"none",transition:"border-color 0.15s"}}
    onFocus={e=>e.target.style.borderColor=C.accent}
    onBlur={e=>e.target.style.borderColor=C.border}/>
);
const Sel=({value,onChange,children,small})=>(
  <select value={value} onChange={e=>onChange(e.target.value)}
    style={{width:"100%",background:C.panel,border:`1px solid ${C.border}`,borderRadius:7,color:C.text,
      fontSize:small?12:13,fontFamily:"inherit",padding:small?"6px 10px":"9px 12px",outline:"none",cursor:"pointer"}}>
    {children}
  </select>
);
const Toggle=({options,value,onChange,small})=>(
  <div style={{display:"flex",background:C.panel,borderRadius:8,padding:3,gap:2}}>
    {options.map(({id,label})=>(
      <button key={id} onClick={()=>onChange(id)} style={{flex:1,padding:small?"5px 0":"7px 0",borderRadius:6,border:"none",
        background:value===id?C.accent:"transparent",color:value===id?"#060f1e":C.muted,
        fontSize:small?10:12,fontWeight:700,fontFamily:"inherit",cursor:"pointer",transition:"all 0.15s"}}>{label}</button>
    ))}
  </div>
);
const RRow=({label,value,unit,hi,warn,sub})=>(
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"7px 0",borderBottom:"1px solid #0a1626"}}>
    <span style={{fontSize:11,color:C.muted}}>{label}</span>
    <div style={{textAlign:"right"}}>
      <span style={{fontSize:hi?20:14,fontWeight:hi?800:600,color:warn?C.amber:hi?C.accent:C.text}}>{value}</span>
      {unit&&<span style={{fontSize:10,color:C.dim,marginLeft:4}}>{unit}</span>}
      {sub&&<div style={{fontSize:10,color:C.dim}}>{sub}</div>}
    </div>
  </div>
);
const Divider=()=><div style={{borderTop:`1px solid ${C.border}`,margin:"12px 0"}}/>;

/* ─── MatRow outside App to prevent remount on rerender ─── */
const MatRow=({mat,accent,updMat,U,units})=>(
  <div style={{display:"grid",gridTemplateColumns:"1.4fr 1fr 1fr 1fr",gap:8,alignItems:"end",padding:"10px 0",borderBottom:"1px solid #0a1626"}}>
    <div>
      <Label style={{marginBottom:3,color:accent||C.muted}}>Name</Label>
      <TxtInp small value={mat.name} onChange={v=>updMat(mat.kind,mat.id,"name",v)} placeholder={mat.kind==="catalyst"?"e.g. NiMo/Al₂O₃":"e.g. ½\" Ceramic"}/>
    </div>
    <div>
      <Label style={{marginBottom:3}}>Bulk Density ({U.dens})</Label>
      <TInp small value={mat.density} onChange={v=>updMat(mat.kind,mat.id,"density",v)} placeholder={units==="si"?"800":"50"}/>
    </div>
    <div>
      <Label style={{marginBottom:3}}>Wt/Drum ({U.mass})</Label>
      <TInp small value={mat.drumWt} onChange={v=>updMat(mat.kind,mat.id,"drumWt",v)} placeholder={units==="si"?"136":"300"}/>
    </div>
    <div>
      <Label style={{marginBottom:3}}>Wt/Bag ({U.mass})</Label>
      <TInp small value={mat.bagWt} onChange={v=>updMat(mat.kind,mat.id,"bagWt",v)} placeholder={units==="si"?"907":"2000"}/>
    </div>
  </div>
);

/* ─── checklist ──────────────────────────────────── */
const CL_ITEMS=[
  {id:"s1",g:"Safety",t:"Confined space entry permit issued and posted at entry point"},
  {id:"s2",g:"Safety",t:"Vessel atmosphere tested — O₂ > 19.5%, LEL < 10%"},
  {id:"s3",g:"Safety",t:"Full PPE confirmed for all personnel entering vessel"},
  {id:"s4",g:"Safety",t:"LOTO complete — all energy sources isolated and tagged"},
  {id:"s5",g:"Safety",t:"All blinds and blanks installed; blinding register signed"},
  {id:"v1",g:"Vessel Inspection",t:"Interior inspected and cleaned — no debris or residue"},
  {id:"v2",g:"Vessel Inspection",t:"Support grids and inlet screens seated and undamaged"},
  {id:"v3",g:"Vessel Inspection",t:"Thermowells confirmed at correct elevation per drawing"},
  {id:"v4",g:"Vessel Inspection",t:"All nozzles and manways inspected and clear"},
  {id:"v5",g:"Vessel Inspection",t:"Outlet basket installed and secured per vendor drawing"},
  {id:"c1",g:"Catalyst",t:"Lot numbers documented and matched to Certificate of Analysis"},
  {id:"c2",g:"Catalyst",t:"Bags/drums inspected — intact, no moisture or clumping"},
  {id:"c3",g:"Catalyst",t:"Container count verified against PO quantity"},
  {id:"l1",g:"Loading",t:"Loading method confirmed with crew"},
  {id:"l2",g:"Loading",t:"Certified scale on-site and zeroed"},
  {id:"l3",g:"Loading",t:"Measuring tape or laser level staged for outage measurement"},
  {id:"l4",g:"Loading",t:"Radios tested — top-of-vessel and ground crew comms confirmed"},
  {id:"d1",g:"Documentation",t:"Loading log sheet prepared (container #, cumulative mass, elevation)"},
  {id:"d2",g:"Documentation",t:"Pre-load photographs taken and filed"},
  {id:"d3",g:"Documentation",t:"Operations notified — loading start time confirmed"},
];
const CL_GROUPS=[...new Set(CL_ITEMS.map(i=>i.g))];

/* ═══════════════════════════════════════════════════
   VESSEL TRACKER VISUAL
═══════════════════════════════════════════════════ */
function VesselTracker({layers,layerVolContrib,xs,bedBottomElev,currentBedTopElev,
  distElevM,clearDist,clearWarnM,totalOutageM,remainingOutage,fillPct,
  isWarn,isDanger,drumsN,fM,fSm,fKg,fRho,toRho,toKg,U,C,LC,getMat,container,fmt,fmtI}){

  const SVG_W=180, SVG_H=340, px=24;
  const refH=Math.max(totalOutageM,distElevM,currentBedTopElev+0.2,0.5);
  const toY=v=>SVG_H - Math.max(0,Math.min(1,v/refH))*SVG_H;
  const bedColor=isDanger?C.red:isWarn?C.amber:C.accent;

  // Build coloured bed fill segments (bottom to top)
  let cursor=bedBottomElev;
  const segments=layers.map((l,i)=>{
    const vol=layerVolContrib[i]||0;
    const h=xs>0?vol/xs:0;
    const seg={layer:l,botElev:cursor,topElev:cursor+h,h};
    cursor+=h;
    return seg;
  }).filter(s=>s.h>0);

  return(
    <div style={{display:"flex",gap:16,alignItems:"flex-start"}}>
      {/* SVG */}
      <div style={{flexShrink:0}}>
        <svg width={SVG_W+50} height={SVG_H+48} viewBox={`0 0 ${SVG_W+50} ${SVG_H+48}`} style={{overflow:"visible"}}>
          {/* vessel shell */}
          <rect x={px} y={4} width={SVG_W-px*2} height={SVG_H} rx={4} fill={C.panel} stroke={C.border} strokeWidth={1.5}/>

          {/* bed fill segments — each layer its own colour */}
          {segments.map((s,i)=>{
            const col=LC[s.layer.type]||C.accent;
            const y1=toY(s.topElev)+4;
            const y2=toY(s.botElev)+4;
            return <rect key={i} x={px+1} y={y1} width={SVG_W-px*2-2} height={Math.max(1,y2-y1)} fill={`${col}30`} stroke={`${col}60`} strokeWidth={0.5}/>;
          })}

          {/* current bed top line */}
          {currentBedTopElev>bedBottomElev&&(
            <g>
              <line x1={px} x2={SVG_W-px} y1={toY(currentBedTopElev)+4} y2={toY(currentBedTopElev)+4}
                stroke={bedColor} strokeWidth={2} strokeDasharray={isDanger?"5,3":"none"}/>
              <text x={SVG_W-px+4} y={toY(currentBedTopElev)+8} fontSize={8} fill={bedColor} fontWeight={700}>{fmt(fM(currentBedTopElev),2)}{U.len}</text>
            </g>
          )}

          {/* distributor line */}
          {distElevM>0&&(
            <g>
              <line x1={px} x2={SVG_W-px} y1={toY(distElevM)+4} y2={toY(distElevM)+4}
                stroke={C.purple} strokeWidth={2} strokeDasharray="7,3"/>
              <text x={SVG_W-px+4} y={toY(distElevM)+8} fontSize={8} fill={C.purple} fontWeight={700}>{fmt(fM(distElevM),2)}{U.len}</text>
              {/* dist symbol */}
              {[0,7,14].map(dx=><rect key={dx} x={px+18+dx} y={toY(distElevM)+1} width={5} height={3} rx={1} fill={C.purple} opacity={0.8}/>)}
              <text x={px+4} y={toY(distElevM)-3} fontSize={7} fill={C.purple}>Distributor</text>
            </g>
          )}

          {/* warning zone shading */}
          {distElevM>0&&clearWarnM>0&&(
            <rect x={px+1} y={toY(distElevM)+4} width={SVG_W-px*2-2}
              height={Math.max(0,toY(distElevM-clearWarnM)-toY(distElevM))}
              fill={`${C.amber}15`}/>
          )}

          {/* basket */}
          {<rect x={px+(SVG_W-px*2)*0.3} y={SVG_H-14+4} width={(SVG_W-px*2)*0.4} height={14}
            rx={2} fill={`${C.amber}30`} stroke={C.amber} strokeWidth={1}/>}

          {/* ruler on left */}
          {[0,0.2,0.4,0.6,0.8,1].map(f=>{
            const yy=4+SVG_H*(1-f);
            return(
              <g key={f}>
                <line x1={px-5} x2={px} y1={yy} y2={yy} stroke={C.dim} strokeWidth={1}/>
                <text x={px-7} y={yy+3} fontSize={6.5} fill={C.dim} textAnchor="end">{fmt(fM(refH*f),1)}</text>
              </g>
            );
          })}
          <text x={7} y={SVG_H/2+4} fontSize={7} fill={C.dim} textAnchor="middle" transform={`rotate(-90,7,${SVG_H/2+4})`}>{U.len}</text>
          <text x={SVG_W/2} y={SVG_H+40} fontSize={8} fill={C.muted} textAnchor="middle">Height from bottom tangent</text>
        </svg>
      </div>

      {/* stats */}
      <div style={{flex:1,display:"flex",flexDirection:"column",gap:10}}>

        {/* clearance card */}
        <div style={{background:isDanger?"#1c0a0a":isWarn?"#1c1000":"#0a1e3d",
          border:`1px solid ${isDanger?C.red:isWarn?C.amber:C.border}`,borderRadius:10,padding:"14px 16px"}}>
          <div style={{fontSize:9,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",
            color:isDanger?C.red:isWarn?C.amber:C.accent,marginBottom:6}}>
            {isDanger?"⚠ BED AT / ABOVE DISTRIBUTOR":isWarn?"⚠ APPROACHING DISTRIBUTOR":"Clearance to Distributor"}
          </div>
          <div style={{fontSize:30,fontWeight:800,lineHeight:1,color:isDanger?C.red:isWarn?C.amber:C.text}}>
            {distElevM>0?fmt(fM(Math.max(0,clearDist||0)),2):"—"}
            <span style={{fontSize:13,fontWeight:400,color:C.muted,marginLeft:6}}>{U.len}</span>
          </div>
          <div style={{fontSize:10,color:C.muted,marginTop:8,display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>
            <span>Bed top: <b style={{color:C.text}}>{fmt(fM(currentBedTopElev),2)} {U.len}</b></span>
            {distElevM>0&&<span>Distributor: <b style={{color:C.purple}}>{fmt(fM(distElevM),2)} {U.len}</b></span>}
            <span>Total containers: <b style={{color:C.text}}>{drumsN}</b></span>
            {totalOutageM>0&&<span>Vessel height: <b style={{color:C.text}}>{fmt(fM(totalOutageM),2)} {U.len}</b></span>}
          </div>
        </div>

        {/* layer-by-layer breakdown */}
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px"}}>
          <div style={{fontSize:9,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:C.muted,marginBottom:10}}>
            Layer Breakdown
          </div>
          {layers.every(l=>nv(l.actualContainers)===0)
            ? <div style={{fontSize:11,color:C.dim}}>Enter actual container counts in the Bed Diagram tab</div>
            : <div style={{display:"flex",flexDirection:"column",gap:5}}>
                {layers.map((l,i)=>{
                  const vol=layerVolContrib[i]||0;
                  const h=xs>0?vol/xs:0;
                  const actC=nv(l.actualContainers);
                  if(actC===0) return null;
                  const col=LC[l.type]||C.accent;
                  return(
                    <div key={l.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",borderBottom:`1px solid ${C.border}`}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <div style={{width:8,height:8,borderRadius:2,background:col,flexShrink:0}}/>
                        <span style={{fontSize:11,color:C.text,fontWeight:500}}>{l.name}</span>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <span style={{fontSize:11,color:col,fontWeight:700}}>{actC} {container}s</span>
                        {h>0&&<span style={{fontSize:10,color:C.muted,marginLeft:8}}>+{fmt(fM(h),2)} {U.len}</span>}
                      </div>
                    </div>
                  );
                })}
                <div style={{display:"flex",justifyContent:"space-between",paddingTop:6,fontWeight:700}}>
                  <span style={{fontSize:11,color:C.text}}>Total bed rise</span>
                  <span style={{fontSize:13,color:C.accent}}>{fmt(fM(currentBedTopElev-bedBottomElev),2)} {U.len}</span>
                </div>
              </div>
          }
        </div>

        {/* outage progress bar */}
        {totalOutageM>0&&(
          <div style={{background:"#0a1e3d",border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px"}}>
            <div style={{fontSize:9,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:C.accent,marginBottom:8}}>
              Vessel Fill — Basket Top → Flange
            </div>
            <div style={{height:10,background:C.panel,borderRadius:999,overflow:"hidden",position:"relative",marginBottom:6}}>
              <div style={{position:"absolute",left:0,top:0,bottom:0,width:`${Math.min(100,fillPct)}%`,borderRadius:999,
                background:fillPct>90?`linear-gradient(90deg,${C.amber},${C.red})`:
                  fillPct>70?`linear-gradient(90deg,${C.accent},${C.amber})`:`linear-gradient(90deg,#0ea5e9,${C.accent})`,
                transition:"width 0.4s"}}/>
              {distElevM>0&&totalOutageM>0&&(
                <div style={{position:"absolute",top:0,bottom:0,width:2,background:C.purple,opacity:0.8,
                  left:`${Math.min(100,(distElevM/totalOutageM)*100)}%`}}/>
              )}
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:10}}>
              <span style={{color:C.muted}}>Basket top (0)</span>
              {distElevM>0&&<span style={{color:C.purple}}>▲ Dist. ({fmt(fM(distElevM),1)} {U.len})</span>}
              <span style={{color:C.muted}}>{fmt(fM(totalOutageM),1)} {U.len}</span>
            </div>
            <div style={{marginTop:8,fontSize:11,color:C.muted}}>
              <b style={{color:remainingOutage<0?C.red:C.text}}>{remainingOutage!=null?fmt(fM(Math.max(0,remainingOutage)),2):"—"} {U.len}</b> remaining · {fillPct.toFixed(1)}% filled
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   PDF EXPORT HELPERS  (uses browser print / html)
═══════════════════════════════════════════════════ */
function exportDiagramPDF(layers,catalysts,icbs,units,container,xs,toRho,toKg,fRho,fM,fKg,U,getMat,layerContainerEst,fmtI,fmt){
  const dateStr=new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
  const allMats=[...catalysts,...icbs].filter(m=>m.name.trim()&&nv(m.density)>0);
  const rows=[...layers].reverse().map(l=>{
    const mat=getMat(l.materialId);
    const est=layerContainerEst(l);
    const col=LC[l.type];
    const tgtD=nv(l.targetDensity), actD=nv(l.actualDensity);
    const tgtT=nv(l.targetThick),   actT=nv(l.actualThick);
    const dVar=tgtD>0&&actD>0?((actD-tgtD)/tgtD*100).toFixed(1):null;
    const tVar=tgtT>0&&actT>0?((actT-tgtT)/tgtT*100).toFixed(1):null;
    const totalC=nv(l.actualContainers);
    // Build interim check rows if any
    const subRows=(l.subOutages||[]).filter(so=>so.drums||so.outage).map((so,si)=>{
      const pct=totalC>0&&nv(so.drums)>0?(nv(so.drums)/totalC*100).toFixed(0):null;
      return`<tr style="background:#fafafa">
        <td style="padding-left:24px;color:#64748b;font-size:10px">↳ Check ${si+1}</td>
        <td colspan="2" style="font-size:10px;color:#64748b">${so.drums?`At ${so.drums} ${container}s${pct?` (${pct}% through layer)`:""}`:"—"}</td>

/* ═══════════════════════════════════════════════════
   MAIN APP

function App(){
  const [tab,setTab]=useState("calc");
  const [units,setUnits]=useState("si");

  /* vessel */
  const [shellID,setShellID]=useState("");
  const [shellH,setShellH]=useState("");
  const [topHead,setTopHead]=useState("ellipsoidal");
  const [botHead,setBotHead]=useState("ellipsoidal");

  /* basket */
  const [hasBasket,setHasBasket]=useState(false);
  const [basketOD,setBasketOD]=useState("");
  const [basketH,setBasketH]=useState("");

  /* global */
  const [container,setContainer]=useState("drum");
  const [loadMethod,setLoadMethod]=useState("sock");

  /* materials */
  const [catalysts,setCatalysts]=useState([makeCat(1),makeCat(2),makeCat(3),makeCat(4),makeCat(5),makeCat(6)]);
  const [icbs,setIcbs]=useState([makeIcb(1),makeIcb(2),makeIcb(3)]);
  const updMat=(kind,id,field,val)=>{
    if(kind==="catalyst") setCatalysts(ms=>ms.map(m=>m.id===id?{...m,[field]:val}:m));
    else setIcbs(ms=>ms.map(m=>m.id===id?{...m,[field]:val}:m));
  };
  const allMaterials=useMemo(()=>[...catalysts,...icbs],[catalysts,icbs]);
  const getMat=id=>allMaterials.find(m=>m.id===id)||null;

  /* calc tab material */
  const [calcMatId,setCalcMatId]=useState("");
  const [voidFrac,setVoidFrac]=useState("0.40");

  /* distributor */
  const [distElev,setDistElev]=useState("");
  const [clearWarn,setClearWarn]=useState("");
  const [flangeToBskt,setFlangeToBskt]=useState("");

  /* back-calc */
  const [bcMass,setBcMass]=useState("");
  const [bcOutage,setBcOutage]=useState("");
  const [bcBotElev,setBcBotElev]=useState("");

  /* checklist */
  const [checked,setChecked]=useState({});

  /* diagram layers */
  const [layers,setLayers]=useState([
    {...newLayer("support"),name:"Support Grading (bottom)"},
    {...newLayer("icb"),name:"ICB Layer 1"},
    {...newLayer("catalyst"),name:"Catalyst Bed 1"},
    {...newLayer("icb"),name:"ICB Layer 2"},
    {...newLayer("inert"),name:"Top Inert Layer"},
  ]);
  const [dragIdx,setDragIdx]=useState(null);
  const [dragOver,setDragOver]=useState(null);

  /* report */
  const [rpCustomer,setRpCustomer]=useState("");
  const [rpCountry,setRpCountry]=useState("");
  const [rpPlant,setRpPlant]=useState("");
  const [rpVessel,setRpVessel]=useState("");
  const [rpDate,setRpDate]=useState("");
  const [rpPreparedBy,setRpPreparedBy]=useState("");

  /* dense loading tracker */
  // dSessions: array of { id, name, materialId, targetDensity, checkEvery, checks:[] }
  // checks: { id, containersLoaded (count at this stop), layerThick (measured), rpm }
  const newDSession=()=>({id:_dsid++,name:"Catalyst Bed 1",materialId:"",targetDensity:"",checkEvery:"10",checks:[]});
  const newCheck=()=>({id:_dchkid++,containersLoaded:"",layerThick:"",rpm:""});
  const [dSessions,setDSessions]=useState([newDSession()]);
  const [activeSession,setActiveSession]=useState(0);
  const updDSession=(idx,field,val)=>setDSessions(s=>s.map((x,i)=>i===idx?{...x,[field]:val}:x));
  const addDCheck=idx=>setDSessions(s=>s.map((x,i)=>i===idx?{...x,checks:[...x.checks,newCheck()]}:x));
  const updDCheck=(sIdx,cId,field,val)=>setDSessions(s=>s.map((x,i)=>i===sIdx?{...x,checks:x.checks.map(c=>c.id===cId?{...c,[field]:val}:c)}:x));
  const removeDCheck=(sIdx,cId)=>setDSessions(s=>s.map((x,i)=>i===sIdx?{...x,checks:x.checks.filter(c=>c.id!==cId)}:x));

  /* units */
  const U=useMemo(()=>({
    len:units==="si"?"m":"ft", vol:units==="si"?"m³":"ft³",
    mass:units==="si"?"kg":"lb", dens:units==="si"?"kg/m³":"lb/ft³",
    sm:units==="si"?"cm":"in", area:units==="si"?"m²":"ft²",
  }),[units]);
  const toM  =v=>units==="si"?nv(v):nv(v)/3.28084;
  const toKg =v=>units==="si"?nv(v):nv(v)/LB_PER_KG;
  const toRho=v=>units==="si"?nv(v):nv(v)*16.0185;
  const fM   =v=>units==="si"?v:v*3.28084;
  const fV   =v=>units==="si"?v:v*FT3_PER_M3;
  const fKg  =v=>units==="si"?v:v*LB_PER_KG;
  const fRho =v=>units==="si"?v:v/16.0185;
  const fSm  =v=>units==="si"?v*100:v*IN_PER_M;

  /* geometry */
  const D=toM(shellID); const Hs=toM(shellH);
  const xs=D>0?XS(D):0;
  const topHV=headVol(topHead,D), botHV=headVol(botHead,D);
  const shellV=D>0&&Hs>0?cylV(D,Hs):0;
  const grossV=topHV+shellV+botHV;
  const bD=toM(basketOD), bH_m=toM(basketH);
  const basketExcl=hasBasket&&bD>0&&bH_m>0?cylV(bD,bH_m):0;
  const usableV=Math.max(0,grossV-basketExcl);

  /* calc material */
  const calcMat=getMat(calcMatId);
  const rho=calcMat?toRho(calcMat.density):0;
  const contWtKg=calcMat?toKg(container==="drum"?calcMat.drumWt:calcMat.bagWt):0;
  const catMass=usableV>0&&rho>0?usableV*rho:null;
  const contVolM3=contWtKg>0&&rho>0?contWtKg/rho:null;
  const nCont=catMass&&contWtKg>0?catMass/contWtKg:null;
  const risePerCont=contVolM3&&xs>0?contVolM3/xs:null;

  /* tracker — multi-layer, per-material volume sum */
  const distElevM=toM(distElev);
  const clearWarnM=nv(clearWarn)>0?toM(clearWarn):0.3;
  const totalOutageM=toM(flangeToBskt);
  // Each layer contributes volume = (actualContainers × kg/container) / bulk_density
  // This correctly handles different materials per layer
  // Per-layer volume contribution array (same index as layers[])
  const layerVolContrib=layers.map(layer=>{
    const mat=getMat(layer.materialId);
    const actC=nv(layer.actualContainers);
    if(!mat||actC<=0) return 0;
    const rhoMat=toRho(mat.density);
    const wt=toKg(container==="drum"?mat.drumWt:mat.bagWt);
    if(rhoMat<=0||wt<=0) return 0;
    return (actC*wt)/rhoMat;
  });
  const totalLoadedVolM3=layerVolContrib.reduce((s,v)=>s+v,0);
  const botHeadEquivH=D>0&&xs>0?botHV/xs:0;
  const bedBottomElev=hasBasket&&bH_m>0?bH_m:botHeadEquivH;
  const currentBedTopElev=bedBottomElev+(xs>0?totalLoadedVolM3/xs:0);
  const clearDist=distElevM>0?distElevM-currentBedTopElev:null;
  const isWarn=clearDist!=null&&clearDist<clearWarnM&&clearDist>=0;
  const isDanger=clearDist!=null&&clearDist<0;
  const remainingOutage=totalOutageM>0&&xs>0?totalOutageM-totalLoadedVolM3/xs:null;
  const fillPct=totalOutageM>0&&xs>0?Math.min(100,(totalLoadedVolM3/xs/totalOutageM)*100):0;
  const drumsN=layers.reduce((s,l)=>s+nv(l.actualContainers),0);

  /* back-calc */
  const bcMassKg=toKg(bcMass);
  const bcOutageM=units==="si"?nv(bcOutage)/100:nv(bcOutage)/IN_PER_M;
  const bcBotElevM=toM(bcBotElev);
  const layerTopFB=Hs>0?Hs-bcOutageM:null;
  const layerH=layerTopFB!=null?layerTopFB-bcBotElevM:null;
  const layerVol=layerH!=null&&layerH>0&&xs>0?xs*layerH:null;
  const backRho=layerVol&&bcMassKg>0?bcMassKg/layerVol:null;

  /* checklist */
  const clDone=Object.values(checked).filter(Boolean).length;
  const clPct=Math.round(clDone/CL_ITEMS.length*100);

  /* diagram */
  const addLayer=type=>setLayers(l=>[...l,newLayer(type)]);
  const removeLayer=id=>setLayers(l=>l.filter(x=>x.id!==id));
  const updLayer=(id,field,val)=>setLayers(l=>l.map(x=>x.id===id?{...x,[field]:val}:x));
  const moveLayer=(from,to)=>setLayers(l=>{const a=[...l];const[item]=a.splice(from,1);a.splice(to,0,item);return a;});
  const addSubOutage=id=>setLayers(l=>l.map(x=>x.id===id?{...x,subOutages:[...(x.subOutages||[]),{id:_soId++,drums:"",outage:""}]}:x));
  const updSubOutage=(layerId,soId,field,val)=>setLayers(l=>l.map(x=>x.id===layerId?{...x,subOutages:(x.subOutages||[]).map(s=>s.id===soId?{...s,[field]:val}:s)}:x));
  const removeSubOutage=(layerId,soId)=>setLayers(l=>l.map(x=>x.id===layerId?{...x,subOutages:(x.subOutages||[]).filter(s=>s.id!==soId)}:x));

  const layerContainerEst=layer=>{
    if(!xs) return null;
    const mat=getMat(layer.materialId); if(!mat) return null;
    const rhoMat=toRho(mat.density);
    const wt=toKg(container==="drum"?mat.drumWt:mat.bagWt);
    const th=nv(layer.targetThick);
    if(rhoMat<=0||wt<=0||th<=0) return null;
    return Math.ceil(xs*toM(String(th))*rhoMat/wt);
  };

  const totalTarget=layers.reduce((s,l)=>s+nv(l.targetThick),0);
  const totalActual=layers.reduce((s,l)=>s+nv(l.actualThick),0);
  const totalEstContainers=layers.reduce((s,l)=>{const e=layerContainerEst(l);return s+(e||0);},0);
  const totalActContainers=layers.reduce((s,l)=>s+nv(l.actualContainers),0);

  const activeCats=catalysts.filter(m=>m.name.trim());
  const activeIcbs=icbs.filter(m=>m.name.trim());

  const TABS=[["materials","Materials"],["calc","Calculator"],["diagram","Loading Diagram"],["dense","Dense Loading"],["report","Report"],["check",`Checklist${clDone>0?` ${clDone}/${CL_ITEMS.length}`:""}`]];

  /* ── render ── */
  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Sora','Segoe UI',sans-serif",display:"flex",flexDirection:"column"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        select option{background:#0d1829;}
        ::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:10px;}
        input::placeholder{color:#253d5b;}
        input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;}
        .hrow:hover{background:#0d1829 !important;}
        .lcard:hover .dh{opacity:1 !important;}
      `}</style>

      {/* top bar */}
      <div style={{background:"#040c1a",borderBottom:`1px solid ${C.border}`,padding:"0 16px",flexShrink:0}}>
        <div style={{maxWidth:1200,margin:"0 auto",display:"flex",alignItems:"center",gap:12,height:52}}>
          <div style={{width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,#38bdf8,#0369a1)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="3" y="2" width="10" height="12" rx="2" stroke="white" strokeWidth="1.5"/><path d="M8 2v12M3 8h10" stroke="white" strokeWidth="1.2" strokeOpacity=".4"/></svg>
          </div>
          <div>
            <div style={{fontSize:14,fontWeight:800,color:"#f1f5f9",letterSpacing:"0.04em"}}>CatLoad</div>
            <div style={{fontSize:9,color:"#253d5b",letterSpacing:"0.1em",textTransform:"uppercase"}}>Catalyst Loading Calculator</div>
          </div>
          <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}}>
            <Toggle options={[{id:"si",label:"SI"},{id:"us",label:"US"}]} value={units} onChange={setUnits} small/>
            <Toggle options={[{id:"drum",label:"Drums"},{id:"bag",label:"Bags"}]} value={container} onChange={setContainer} small/>
            <div style={{display:"flex",background:C.panel,borderRadius:8,padding:3,gap:2}}>
              {TABS.map(([id,label])=>(
                <button key={id} onClick={()=>setTab(id)} style={{background:tab===id?"#1e3a5f":"transparent",border:"none",borderRadius:6,color:tab===id?"#f1f5f9":C.muted,cursor:"pointer",fontSize:11,fontWeight:600,fontFamily:"inherit",padding:"6px 12px",transition:"all 0.15s"}}>{label}</button>
              ))}
            </div>
          </div>
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"20px 16px 52px"}}>
        <div style={{maxWidth:1200,margin:"0 auto"}}>

          {/* ══ MATERIALS ══ */}
          {tab==="materials"&&(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
              <Card>
                <STitle color={C.purple}>Catalyst Materials (up to 6)</STitle>
                <div style={{fontSize:11,color:C.muted,marginBottom:14,lineHeight:1.5}}>Name, bulk density, and net weight per drum/bag for each catalyst.</div>
                <div style={{display:"grid",gridTemplateColumns:"1.4fr 1fr 1fr 1fr",gap:8,padding:"4px 0 8px",borderBottom:`1px solid ${C.border}`}}>
                  {["Material Name",`Bulk Density (${U.dens})`,`Wt/Drum (${U.mass})`,`Wt/Bag (${U.mass})`].map(h=>(
                    <div key={h} style={{fontSize:9,fontWeight:700,color:C.dim,letterSpacing:"0.08em",textTransform:"uppercase"}}>{h}</div>
                  ))}
                </div>
                {catalysts.map(mat=><MatRow key={mat.id} mat={mat} accent={C.purple} updMat={updMat} U={U} units={units}/>)}
              </Card>
              <Card>
                <STitle color={C.accent}>ICB / Inert Ball Materials (up to 3)</STitle>
                <div style={{fontSize:11,color:C.muted,marginBottom:14,lineHeight:1.5}}>Different sizes (½", 1", 1½") typically have different densities and container weights.</div>
                <div style={{display:"grid",gridTemplateColumns:"1.4fr 1fr 1fr 1fr",gap:8,padding:"4px 0 8px",borderBottom:`1px solid ${C.border}`}}>
                  {["Material Name",`Bulk Density (${U.dens})`,`Wt/Drum (${U.mass})`,`Wt/Bag (${U.mass})`].map(h=>(
                    <div key={h} style={{fontSize:9,fontWeight:700,color:C.dim,letterSpacing:"0.08em",textTransform:"uppercase"}}>{h}</div>
                  ))}
                </div>
                {icbs.map(mat=><MatRow key={mat.id} mat={mat} accent={C.accent} updMat={updMat} U={U} units={units}/>)}
                <Divider/>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:C.muted,marginBottom:10}}>Defined Materials Summary</div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {allMaterials.filter(m=>m.name.trim()&&(nv(m.density)>0||nv(m.drumWt)>0)).map(mat=>{
                    const col=mat.kind==="catalyst"?C.purple:C.accent;
                    const rhoSI=toRho(mat.density);
                    const drumKg=toKg(mat.drumWt), bagKg=toKg(mat.bagWt);
                    return(
                      <div key={mat.id} style={{background:C.panel,borderRadius:8,padding:"8px 12px",borderLeft:`3px solid ${col}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                        <div>
                          <div style={{fontSize:12,fontWeight:700,color:col}}>{mat.name}</div>
                          <div style={{fontSize:10,color:C.muted,marginTop:2}}>{mat.kind==="catalyst"?"Catalyst":"ICB"} · ρ = {rhoSI>0?`${fmt(fRho(rhoSI))} ${U.dens}`:"—"}</div>
                        </div>
                        <div style={{display:"flex",gap:16}}>
                          <div style={{textAlign:"center"}}>
                            <div style={{fontSize:11,fontWeight:700,color:C.text}}>{drumKg>0?`${fmt(fKg(drumKg),0)} ${U.mass}`:"—"}</div>
                            <div style={{fontSize:9,color:C.dim}}>per drum</div>
                          </div>
                          <div style={{textAlign:"center"}}>
                            <div style={{fontSize:11,fontWeight:700,color:C.text}}>{bagKg>0?`${fmt(fKg(bagKg),0)} ${U.mass}`:"—"}</div>
                            <div style={{fontSize:9,color:C.dim}}>per bag</div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                  {allMaterials.every(m=>!m.name.trim())&&<div style={{fontSize:11,color:C.dim,padding:"8px 0"}}>No materials defined yet</div>}
                </div>
              </Card>
            </div>
          )}

          {/* ══ CALCULATOR ══ */}
          {tab==="calc"&&(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                {/* vessel */}
                <Card>
                  <STitle>① Vessel Shell</STitle>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    <div><Label>Internal Diameter ({U.len})</Label><TInp value={shellID} onChange={setShellID} placeholder={units==="si"?"e.g. 2.438":"e.g. 8.0"}/><Hint>Internal (corroded) ID from drawings</Hint></div>
                    <div><Label>T-to-T Height ({U.len})</Label><TInp value={shellH} onChange={setShellH} placeholder={units==="si"?"e.g. 6.0":"e.g. 19.7"}/><Hint>Shell only — not including heads</Hint></div>
                    <div><Label>Top Head Type</Label>
                      <Sel value={topHead} onChange={setTopHead}>
                        <option value="ellipsoidal">2:1 Ellipsoidal (SE)</option>
                        <option value="hemispherical">Hemispherical</option>
                        <option value="fd">ASME F&D</option>
                        <option value="flat">Flat (no volume)</option>
                      </Sel>
                      {topHead!=="flat"&&D>0&&<Hint>Vol: {fmt(fV(headVol(topHead,D)))} {U.vol}</Hint>}
                    </div>
                    <div><Label>Bottom Head Type</Label>
                      <Sel value={botHead} onChange={setBotHead}>
                        <option value="ellipsoidal">2:1 Ellipsoidal (SE)</option>
                        <option value="hemispherical">Hemispherical</option>
                        <option value="fd">ASME F&D</option>
                        <option value="flat">Flat (no volume)</option>
                      </Sel>
                      {botHead!=="flat"&&D>0&&<Hint>Vol: {fmt(fV(headVol(botHead,D)))} {U.vol}</Hint>}
                    </div>
                  </div>
                </Card>
                {/* basket */}
                <Card>
                  <STitle color={C.amber}>② Outlet Basket</STitle>
                  <Toggle options={[{id:"false",label:"No Basket"},{id:"true",label:"Basket Present"}]} value={String(hasBasket)} onChange={v=>setHasBasket(v==="true")}/>
                  {hasBasket&&(
                    <div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${C.border}`,display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                      <div><Label>Basket OD ({U.len})</Label><TInp value={basketOD} onChange={setBasketOD} placeholder={units==="si"?"0.30":"1.0"}/><Hint>Outer diameter of basket cylinder</Hint></div>
                      <div><Label>Basket Height ({U.len})</Label><TInp value={basketH} onChange={setBasketH} placeholder={units==="si"?"0.60":"2.0"}/><Hint>From bottom tangent upward</Hint></div>
                      {bD>0&&bH_m>0&&(
                        <div style={{gridColumn:"1/-1",background:"#0a1e10",border:"1px solid #166534",borderRadius:8,padding:"10px 14px"}}>
                          <div style={{fontSize:10,color:C.amber,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>Excluded Volume</div>
                          <div style={{fontSize:20,fontWeight:800,color:"#fbbf24"}}>{fmt(fV(basketExcl))} <span style={{fontSize:11,fontWeight:400,color:C.muted}}>{U.vol}</span></div>
                        </div>
                      )}
                    </div>
                  )}
                </Card>
                {/* material */}
                <Card>
                  <STitle color={C.purple}>③ Material &amp; Loading</STitle>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    <div style={{gridColumn:"1/-1"}}>
                      <Label>Select Material</Label>
                      <Sel value={calcMatId} onChange={setCalcMatId}>
                        <option value="">— Choose a material —</option>
                        {activeCats.length>0&&<optgroup label="Catalysts">{activeCats.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</optgroup>}
                        {activeIcbs.length>0&&<optgroup label="ICBs">{activeIcbs.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</optgroup>}
                        {activeCats.length===0&&activeIcbs.length===0&&<option disabled>Define materials in Materials tab first</option>}
                      </Sel>
                      <Hint>Define materials in the Materials tab first</Hint>
                    </div>
                    {calcMat&&(<>
                      <div style={{background:C.panel,borderRadius:8,padding:"8px 12px"}}>
                        <Label>Bulk Density</Label>
                        <div style={{fontSize:16,fontWeight:700,color:C.text}}>{nv(calcMat.density)>0?`${fmt(fRho(toRho(calcMat.density)))} ${U.dens}`:"—"}</div>
                      </div>
                      <div style={{background:C.panel,borderRadius:8,padding:"8px 12px"}}>
                        <Label>{container==="drum"?"Weight / Drum":"Weight / Bag"}</Label>
                        <div style={{fontSize:16,fontWeight:700,color:C.accent}}>{(()=>{const w=toKg(container==="drum"?calcMat.drumWt:calcMat.bagWt);return w>0?`${fmt(fKg(w),0)} ${U.mass}`:"—";})()}</div>
                      </div>
                      {contVolM3&&risePerCont&&(
                        <div style={{gridColumn:"1/-1",background:"#0a1e3d",border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",display:"flex",gap:24}}>
                          <div><div style={{fontSize:9,color:C.dim,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:2}}>Vol / {container}</div><div style={{fontSize:14,fontWeight:700,color:C.text}}>{fmt(fV(contVolM3))} <span style={{fontSize:10,color:C.muted}}>{U.vol}</span></div></div>
                          <div><div style={{fontSize:9,color:C.dim,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:2}}>Bed rise / {container}</div><div style={{fontSize:14,fontWeight:700,color:C.accent}}>{fmt(fSm(risePerCont))} <span style={{fontSize:10,color:C.muted}}>{U.sm}</span></div></div>
                        </div>
                      )}
                    </>)}
                    <div style={{gridColumn:"1/-1"}}>
                      <Label>Loading Method</Label>
                      <Sel value={loadMethod} onChange={setLoadMethod}>
                        <option value="freefill">Free Fall</option>
                        <option value="sock">Sock Loading</option>
                        <option value="dense">Dense Phase Loading</option>
                      </Sel>
                    </div>
                    <div style={{gridColumn:"1/-1"}}>
                      <Label>Void Fraction (ε) — {parseFloat(voidFrac).toFixed(2)}</Label>
                      <input type="range" min="0.25" max="0.60" step="0.01" value={voidFrac} onChange={e=>setVoidFrac(e.target.value)} style={{width:"100%",accentColor:C.accent,marginTop:4}}/>
                      <Hint>Typical packed beds: 0.35 – 0.45</Hint>
                    </div>
                  </div>
                </Card>
                {/* back calc */}
                <Card style={{border:"1px solid #1a3d2a"}}>
                  <STitle color={C.green}>⑤ Field Density Calculator</STitle>
                  <div style={{fontSize:11,color:C.muted,marginBottom:12,lineHeight:1.5}}>Back-calculate actual bulk density from mass loaded and measured outage.</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    <div><Label>Mass Loaded ({U.mass})</Label><TInp value={bcMass} onChange={setBcMass} placeholder={units==="si"?"5000":"11000"}/></div>
                    <div><Label>Current Outage ({U.sm})</Label><TInp value={bcOutage} onChange={setBcOutage} placeholder={units==="si"?"45":"18"}/><Hint>Top tangent → catalyst surface</Hint></div>
                    <div style={{gridColumn:"1/-1"}}><Label>Bottom of Layer Elevation ({U.len})</Label><TInp value={bcBotElev} onChange={setBcBotElev} placeholder="0 = starts at bottom head"/><Hint>From bottom tangent upward</Hint></div>
                  </div>
                  {backRho!=null&&backRho>0?(
                    <div style={{marginTop:14,background:"#0a2d1e",border:"1px solid #166534",borderRadius:9,padding:"12px 14px"}}>
                      <div style={{fontSize:10,color:C.green,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6}}>Back-Calculated Density</div>
                      <div style={{fontSize:26,fontWeight:800,color:"#6ee7b7"}}>{fmt(fRho(backRho))} <span style={{fontSize:12,fontWeight:400,color:C.green}}>{U.dens}</span></div>
                      {rho>0&&<div style={{fontSize:11,color:C.muted,marginTop:6}}>vs. {calcMat?.name} {fmt(fRho(rho))} {U.dens} — <span style={{color:Math.abs(backRho-rho)/rho<0.05?C.green:C.amber}}>{(((backRho-rho)/rho)*100).toFixed(1)}% variance</span></div>}
                    </div>
                  ):<div style={{marginTop:12,fontSize:11,color:C.dim}}>Enter all fields above plus vessel shell dimensions</div>}
                </Card>
              </div>

              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                {/* volume summary */}
                <Card style={{border:"1px solid #1e4976"}}>
                  <STitle>Volume Summary</STitle>
                  <RRow label="Shell volume" value={fmt(fV(shellV))} unit={U.vol}/>
                  <RRow label="Top head volume" value={fmt(fV(topHV))} unit={U.vol}/>
                  <RRow label="Bottom head volume" value={fmt(fV(botHV))} unit={U.vol}/>
                  {hasBasket&&basketExcl>0&&<RRow label="Outlet basket excluded" value={`− ${fmt(fV(basketExcl))}`} unit={U.vol}/>}
                  <Divider/>
                  <RRow label="Gross vessel volume" value={fmt(fV(grossV))} unit={U.vol}/>
                  <RRow label="Usable catalyst volume" value={fmt(fV(usableV))} unit={U.vol} hi/>
                </Card>
                {/* loading estimate */}
                <Card>
                  <STitle>Loading Estimate</STitle>
                  {rho>0&&usableV>0?(<>
                    <RRow label="Total catalyst mass" value={fmt(fKg(catMass),0)} unit={U.mass} hi/>
                    <RRow label="Vessel cross-section" value={fmt(units==="si"?xs:xs*FT3_PER_M3/3.28084)} unit={U.area}/>
                    <Divider/>
                    {contWtKg>0?(<>
                      <RRow label={container==="drum"?"Drums needed":"Bags needed"} value={fmtI(nCont)} sub={`${fmt(fKg(contWtKg),0)} ${U.mass} / ${container} — ${calcMat?.name}`}/>
                      {contVolM3&&<RRow label="Bed rise per container" value={fmt(fSm(risePerCont))} unit={U.sm} sub="Height increase per container loaded"/>}
                    </>):<div style={{fontSize:11,color:C.dim,padding:"6px 0"}}>{calcMat?`Enter weight per ${container} for ${calcMat.name} in the Materials tab`:"Select a material above"}</div>}
                  </>):<div style={{fontSize:12,color:C.dim,padding:"8px 0"}}>Enter vessel dimensions and select a material</div>}
                </Card>
                {/* tracker */}
                <Card style={{border:`1px solid ${isDanger?"#7f1d1d":isWarn?"#78350f":C.border}`}}>
                  <STitle color={isDanger?C.red:isWarn?C.amber:C.accent}>④ Distributor &amp; Outage Tracker</STitle>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
                    <div><Label>Distributor Bottom Elev. ({U.len})</Label><TInp value={distElev} onChange={setDistElev} placeholder={units==="si"?"e.g. 5.5":"e.g. 18"}/><Hint>From bottom tangent up to distributor bottom</Hint></div>
                    <div><Label>Warning Threshold ({U.len})</Label><TInp value={clearWarn} onChange={setClearWarn} placeholder={units==="si"?"0.30":"1.0"}/><Hint>Alert when clearance drops below this</Hint></div>
                    <div style={{gridColumn:"1/-1"}}>
                      <Label>Containers Loaded Per Layer</Label>
                      <div style={{background:C.panel,borderRadius:8,padding:"10px 12px",display:"flex",flexDirection:"column",gap:6}}>
                        {layers.every(l=>nv(l.actualContainers)===0)
                          ? <div style={{fontSize:11,color:C.dim}}>Enter actual container counts per layer in the Bed Diagram tab. The tracker will automatically compute bed height from each material's actual density and container weight.</div>
                          : layers.filter(l=>nv(l.actualContainers)>0).map(l=>{
                              const mat=getMat(l.materialId);
                              const actC=nv(l.actualContainers);
                              const rhoMat=mat?toRho(mat.density):0;
                              const wt=mat?toKg(container==="drum"?mat.drumWt:mat.bagWt):0;
                              const vol=rhoMat>0&&wt>0?(actC*wt)/rhoMat:0;
                              const rise=xs>0&&vol>0?fSm(vol/xs):null;
                              return(
                                <div key={l.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:11}}>
                                  <span style={{color:LC[l.type],fontWeight:600}}>{l.name}</span>
                                  <span style={{color:C.muted}}>{actC} {container}s{rise!=null?` → ${fmt(rise,1)} ${U.sm}`:""}</span>
                                </div>
                              );
                            })
                        }
                        {layers.some(l=>nv(l.actualContainers)>0)&&(
                          <div style={{borderTop:`1px solid ${C.border}`,marginTop:4,paddingTop:6,display:"flex",justifyContent:"space-between",fontSize:11,fontWeight:700}}>
                            <span style={{color:C.text}}>Total</span>
                            <span style={{color:C.accent}}>{drumsN} {container}s → {xs>0&&totalLoadedVolM3>0?fmt(fSm(totalLoadedVolM3/xs),1):"—"} {U.sm} rise</span>
                          </div>
                        )}
                      </div>
                      <Hint>Container counts come from Bed Diagram → Actual containers per layer</Hint>
                    </div>
                    <div><Label>Flange Face → Basket Top ({U.len})</Label><TInp value={flangeToBskt} onChange={setFlangeToBskt} placeholder={units==="si"?"e.g. 7.0":"e.g. 23"}/><Hint>Total internal height flange to basket top</Hint></div>
                  </div>
                  <VesselTracker
                    layers={layers} layerVolContrib={layerVolContrib}
                    xs={xs} bedBottomElev={bedBottomElev}
                    currentBedTopElev={currentBedTopElev} distElevM={distElevM}
                    clearDist={clearDist} clearWarnM={clearWarnM}
                    totalOutageM={totalOutageM} remainingOutage={remainingOutage}
                    fillPct={fillPct} isWarn={isWarn} isDanger={isDanger} drumsN={drumsN}
                    fM={fM} fSm={fSm} fKg={fKg} fRho={fRho} toRho={toRho} toKg={toKg}
                    U={U} C={C} LC={LC} getMat={getMat} container={container}
                    fmt={fmt} fmtI={fmtI}/>
                </Card>
              </div>
            </div>
          )}

          {/* ══ DIAGRAM ══ */}
          {tab==="diagram"&&(
            <div style={{display:"grid",gridTemplateColumns:"420px 1fr",gap:16,alignItems:"start"}}>
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <Card>
                  <STitle>Loading Diagram</STitle>
                  <div style={{fontSize:11,color:C.muted,marginBottom:12,lineHeight:1.5}}>
                    Layers listed top → bottom. Each layer has a final outage field and optional interim outage checks.
                  </div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
                    {Object.entries(LL).map(([type,label])=>(
                      <button key={type} onClick={()=>addLayer(type)} style={{background:"transparent",border:`1.5px solid ${LC[type]}`,color:LC[type],borderRadius:6,padding:"5px 10px",fontSize:10,fontWeight:700,fontFamily:"inherit",cursor:"pointer",letterSpacing:"0.06em"}}>+ {label.split(" ")[0]}</button>
                    ))}
                  </div>

                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    {[...layers].reverse().map((layer,revIdx)=>{
                      const realIdx=layers.length-1-revIdx;
                      const col=LC[layer.type];
                      const isDO=dragOver===realIdx;
                      const mat=getMat(layer.materialId);
                      const est=layerContainerEst(layer);
                      return(
                        <div key={layer.id} className="lcard" draggable
                          onDragStart={()=>setDragIdx(realIdx)}
                          onDragOver={e=>{e.preventDefault();setDragOver(realIdx);}}
                          onDragLeave={()=>setDragOver(null)}
                          onDrop={()=>{if(dragIdx!=null&&dragIdx!==realIdx)moveLayer(dragIdx,realIdx);setDragIdx(null);setDragOver(null);}}
                          style={{background:isDO?"#1a2e50":C.panel,border:`1px solid ${isDO?C.accent:col+"44"}`,borderRadius:9,padding:"10px 12px",transition:"all 0.15s"}}>
                          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                            <div className="dh" style={{opacity:0.3,cursor:"grab",fontSize:14,color:C.muted,transition:"opacity 0.15s",userSelect:"none"}}>⠿</div>
                            <div style={{width:8,height:8,borderRadius:2,background:col,flexShrink:0}}/>
                            <input value={layer.name} onChange={e=>updLayer(layer.id,"name",e.target.value)}
                              style={{flex:1,background:"transparent",border:"none",color:C.text,fontSize:12,fontWeight:600,fontFamily:"inherit",outline:"none"}}/>
                            <button onClick={()=>removeLayer(layer.id)} style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:16,padding:"0 2px",lineHeight:1}}>×</button>
                          </div>
                          {/* material */}
                          <div style={{marginBottom:10}}>
                            <Label style={{marginBottom:3}}>Assigned Material</Label>
                            <Sel small value={layer.materialId} onChange={v=>updLayer(layer.id,"materialId",v)}>
                              <option value="">— Select material —</option>
                              {activeCats.length>0&&<optgroup label="Catalysts">{activeCats.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</optgroup>}
                              {activeIcbs.length>0&&<optgroup label="ICBs">{activeIcbs.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</optgroup>}
                            </Sel>
                            {mat&&<div style={{fontSize:10,color:C.muted,marginTop:4}}>ρ = {nv(mat.density)>0?`${fmt(fRho(toRho(mat.density)))} ${U.dens}`:"—"} · {container}: {(()=>{const w=toKg(container==="drum"?mat.drumWt:mat.bagWt);return w>0?`${fmt(fKg(w),0)} ${U.mass}`:"not set";})()}</div>}
                          </div>
                          {/* thickness + density */}
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
                            <div><Label style={{marginBottom:3}}>Target Thick ({U.len})</Label><TInp small value={layer.targetThick} onChange={v=>updLayer(layer.id,"targetThick",v)}/></div>
                            <div><Label style={{marginBottom:3}}>Actual Thick ({U.len})</Label><TInp small value={layer.actualThick} onChange={v=>updLayer(layer.id,"actualThick",v)}/></div>
                            <div><Label style={{marginBottom:3}}>Target Density ({U.dens})</Label><TInp small value={layer.targetDensity} onChange={v=>updLayer(layer.id,"targetDensity",v)} placeholder={mat&&mat.density?fmt(fRho(toRho(mat.density)),0):"—"}/></div>
                            <div><Label style={{marginBottom:3}}>Actual Density ({U.dens})</Label><TInp small value={layer.actualDensity} onChange={v=>updLayer(layer.id,"actualDensity",v)}/></div>
                          </div>
                          {/* est + actual containers side by side */}
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
                            <div style={{background:"#0a1e3d",border:`1px solid ${C.border}`,borderRadius:7,padding:"7px 10px"}}>
                              <div style={{fontSize:9,color:C.dim,marginBottom:3}}>Est. {container}s</div>
                              <div style={{fontSize:18,fontWeight:800,color:C.purple}}>{est!=null?fmtI(est):"—"}</div>
                              {!est&&layer.materialId&&<div style={{fontSize:9,color:C.dim,marginTop:2}}>enter target thickness</div>}
                            </div>
                            <div style={{background:"#0a2218",border:`1px solid #1a4030`,borderRadius:7,padding:"7px 10px"}}>
                              <div style={{fontSize:9,color:C.dim,marginBottom:3}}>Actual {container}s</div>
                              <TInp small value={layer.actualContainers} onChange={v=>updLayer(layer.id,"actualContainers",v)} placeholder="—"/>
                            </div>
                          </div>

                          {/* ── Outage tracking ── */}
                          <div style={{borderTop:`1px solid ${col}33`,paddingTop:8}}>
                            {/* Final outage for this layer */}
                            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                              <div style={{fontSize:9,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:col,flex:1}}>
                                Final Outage ({U.sm})
                              </div>
                              <button onClick={()=>addSubOutage(layer.id)}
                                style={{background:"transparent",border:`1px solid ${col}66`,borderRadius:5,
                                  color:col,fontSize:10,fontWeight:700,padding:"2px 8px",cursor:"pointer",
                                  display:"flex",alignItems:"center",gap:3}}>
                                <span style={{fontSize:13,lineHeight:1}}>+</span> Add Interim Check
                              </button>
                            </div>
                            <div style={{display:"grid",gridTemplateColumns:"1fr",gap:4,marginBottom:6}}>
                              <TInp small value={layer.finalOutage||""} onChange={v=>updLayer(layer.id,"finalOutage",v)}
                                placeholder={`Final outage from top tangent (${U.sm})`} unit={U.sm}/>
                              {layer.finalOutage&&<div style={{fontSize:10,color:col,fontWeight:600}}>
                                → Layer top at: {(()=>{
                                  const outM=units==="si"?nv(layer.finalOutage)/100:nv(layer.finalOutage)/IN_PER_M;
                                  const topFromBot=Hs>0?fM(Hs-outM):null;
                                  return topFromBot!=null?`${fmt(topFromBot,2)} ${U.len} from bottom tangent`:"enter vessel height";
                                })()}
                              </div>}
                            </div>

                            {/* Sub-outage measurements — each is independent drums/outage pair */}
                            {(layer.subOutages||[]).length>0&&(
                              <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:4}}>
                                {/* column headers */}
                                <div style={{display:"grid",gridTemplateColumns:"44px 1fr 1fr 1fr 24px",gap:4,padding:"2px 0"}}>
                                  <div style={{fontSize:9,color:C.dim,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>#</div>
                                  <div style={{fontSize:9,color:C.dim,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>{container}s at check</div>
                                  <div style={{fontSize:9,color:C.dim,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Outage ({U.sm})</div>
                                  <div style={{fontSize:9,color:C.dim,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>% of layer</div>
                                  <div/>
                                </div>
                                {(layer.subOutages||[]).map((so,si)=>{
                                  const totalC=nv(layer.actualContainers);
                                  const atCheck=nv(so.drums);
                                  const pct=totalC>0&&atCheck>0?Math.min(100,(atCheck/totalC)*100):null;
                                  return(
                                    <div key={so.id} style={{background:"#0a1525",borderRadius:7,padding:"7px 8px",border:`1px solid ${col}33`}}>
                                      <div style={{display:"grid",gridTemplateColumns:"44px 1fr 1fr 1fr 24px",gap:4,alignItems:"center",marginBottom:pct!=null?6:0}}>
                                        <div style={{fontSize:10,fontWeight:700,color:col}}>#{si+1}</div>
                                        <TInp small value={so.drums} onChange={v=>updSubOutage(layer.id,so.id,"drums",v)} placeholder={`e.g. ${(si+1)*10}`}/>
                                        <TInp small value={so.outage} onChange={v=>updSubOutage(layer.id,so.id,"outage",v)} placeholder={units==="si"?"cm":"in"} unit={U.sm}/>
                                        <div style={{fontSize:10,fontWeight:700,color:pct!=null?C.amber:C.dim}}>
                                          {pct!=null?`${pct.toFixed(0)}%`:"—"}
                                        </div>
                                        <button onClick={()=>removeSubOutage(layer.id,so.id)}
                                          style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:14,padding:0,lineHeight:1}}>×</button>
                                      </div>
                                      {/* mini progress bar showing where in the layer this check was taken */}
                                      {pct!=null&&(
                                        <div style={{height:4,background:C.panel,borderRadius:999,overflow:"hidden",position:"relative"}}>
                                          <div style={{position:"absolute",left:0,top:0,bottom:0,width:`${pct}%`,
                                            background:`linear-gradient(90deg,${col}88,${col})`,borderRadius:999}}/>
                                          <div style={{position:"absolute",left:`${pct}%`,top:0,bottom:0,width:2,background:C.amber,transform:"translateX(-1px)"}}/>
                                        </div>
                                      )}
                                      {so.outage&&<div style={{fontSize:9,color:C.muted,marginTop:3}}>
                                        Outage: <span style={{color:C.amber,fontWeight:600}}>{so.outage} {U.sm}</span>
                                        {so.drums&&<span style={{color:C.dim}}> at {so.drums} {container}s{pct!=null?` (${pct.toFixed(0)}% through layer)`:""}</span>}
                                      </div>}
                                    </div>
                                  );
                                })}
                              </div>
                            )}
                            {(layer.subOutages||[]).length===0&&(
                              <div style={{fontSize:10,color:C.dim,padding:"2px 0"}}>No interim checks yet — click "+ Add Interim Check" to log outage at each drum stop</div>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  <Divider/>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
                    {[
                      ["Target H",totalTarget>0?`${fmt(totalTarget)} ${U.len}`:"—",C.text],
                      ["Actual H",totalActual>0?`${fmt(totalActual)} ${U.len}`:"—",C.accent],
                      [`Est. ${container==="drum"?"Drums":"Bags"}`,totalEstContainers>0?fmtI(totalEstContainers):"—",C.purple],
                      [`Act. ${container==="drum"?"Drums":"Bags"}`,totalActContainers>0?fmtI(totalActContainers):"—",C.green],
                    ].map(([lbl,val,col])=>(
                      <div key={lbl} style={{background:C.panel,borderRadius:7,padding:"8px 10px"}}>
                        <Label style={{marginBottom:4}}>{lbl}</Label>
                        <div style={{fontSize:14,fontWeight:700,color:col}}>{val}</div>
                      </div>
                    ))}
                  </div>

                  <div style={{marginTop:14,display:"flex",gap:8}}>
                    <button onClick={()=>exportDiagramPDF(layers,catalysts,icbs,units,container,xs,toRho,toKg,fRho,fM,fKg,U,getMat,layerContainerEst,fmtI,fmt)}
                      style={{flex:1,background:C.accent,border:"none",borderRadius:8,color:"#060f1e",fontWeight:700,fontSize:12,fontFamily:"inherit",padding:"10px 0",cursor:"pointer"}}>
                      ↓ Export Diagram PDF
                    </button>
                  </div>
                </Card>
              </div>

              {/* right: visual */}
              <div style={{position:"sticky",top:20}}>
                <Card>
                  <STitle>Vessel Cross-Section</STitle>
                  <div style={{display:"flex",gap:20,alignItems:"flex-start"}}>
                    {/* vessel drawing */}
                    <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:160,flexShrink:0}}>
                      <div style={{width:28,height:10,background:"#1e3a5f",border:`1px solid ${C.border}`,borderRadius:"4px 4px 0 0"}}/>
                      <div style={{width:100,height:12,background:"#1e3a5f",border:`1px solid ${C.border}`,borderRadius:"4px 4px 0 0"}}/>
                      <div style={{width:100}}><svg width="100" height="30" viewBox="0 0 100 30"><path d="M0 0 Q50 30 100 0" fill="#111f35" stroke="#1e3a5f" strokeWidth="1.5"/><text x="50" y="22" textAnchor="middle" fontSize="7" fill="#475569">Distributor</text></svg></div>
                      {(()=>{
                        const maxH=Math.max(totalActual,totalTarget,0.01);
                        const SHELL_PX=320;
                        return(
                          <div style={{width:100,border:`1.5px solid ${C.border}`,borderTop:"none",borderBottom:"none",display:"flex",flexDirection:"column-reverse",minHeight:SHELL_PX,background:C.panel,position:"relative"}}>
                            {layers.map(layer=>{
                              const th=nv(layer.actualThick)||nv(layer.targetThick);
                              if(th<=0) return null;
                              const px=Math.max(18,(th/maxH)*SHELL_PX);
                              const col=LC[layer.type];
                              const hasAct=nv(layer.actualThick)>0;
                              const tgtD=nv(layer.targetDensity),actD=nv(layer.actualDensity);
                              const densOk=tgtD>0&&actD>0?Math.abs(actD-tgtD)/tgtD<0.05:null;
                              const est=layerContainerEst(layer);
                              const actCont=nv(layer.actualContainers);
                              // Build interim check lines — each positioned as pct% from bottom of this layer
                              const totalC=nv(layer.actualContainers);
                              const subChecks=(layer.subOutages||[]).filter(so=>nv(so.drums)>0||nv(so.outage)>0);
                              return(
                                <div key={layer.id} title={layer.name} style={{height:px,background:`${col}22`,borderTop:`2px solid ${col}88`,display:"flex",flexDirection:"column",justifyContent:"center",padding:"0 6px",flexShrink:0,position:"relative",overflow:"visible"}}>
                                  {!hasAct&&<div style={{position:"absolute",inset:0,opacity:0.12,backgroundImage:`repeating-linear-gradient(45deg,${col} 0,${col} 1px,transparent 0,transparent 50%)`,backgroundSize:"8px 8px"}}/>}

                                  {/* Interim check lines — horizontal dashed lines inside the layer */}
                                  {subChecks.map((so,si)=>{
                                    const atC=nv(so.drums);
                                    const pct=totalC>0&&atC>0?Math.min(100,(atC/totalC)*100):null;
                                    if(pct==null) return null;
                                    // pct% from bottom of div = (100-pct)% from top
                                    const topPct=100-pct;
                                    return(
                                      <div key={so.id} style={{position:"absolute",left:0,right:0,
                                        top:`${topPct}%`,height:0,overflow:"visible",zIndex:3}}>
                                        {/* dashed line across full width */}
                                        <div style={{position:"absolute",left:0,right:0,height:1,
                                          background:`repeating-linear-gradient(90deg,${C.amber} 0px,${C.amber} 4px,transparent 4px,transparent 8px)`}}/>
                                        {/* label on right side */}
                                        <div style={{position:"absolute",right:-46,top:-8,
                                          fontSize:7,color:C.amber,fontWeight:700,whiteSpace:"nowrap",
                                          background:"#060f1e",padding:"1px 3px",borderRadius:2,lineHeight:1.4}}>
                                          {so.drums&&`${so.drums}▸`}{so.outage?`${so.outage}${units==="si"?"c":"″"}`:`chk${si+1}`}
                                        </div>
                                      </div>
                                    );
                                  })}

                                  {/* Final outage tick at top of layer */}
                                  {layer.finalOutage&&(
                                    <div style={{position:"absolute",left:0,right:0,top:0,height:0,overflow:"visible",zIndex:4}}>
                                      <div style={{position:"absolute",left:0,right:0,height:2,background:col,opacity:0.9}}/>
                                      <div style={{position:"absolute",right:-46,top:-8,
                                        fontSize:7,color:col,fontWeight:800,whiteSpace:"nowrap",
                                        background:"#060f1e",padding:"1px 3px",borderRadius:2,lineHeight:1.4}}>
                                        ⊕{layer.finalOutage}{units==="si"?"c":"″"}
                                      </div>
                                    </div>
                                  )}

                                  <div style={{fontSize:8,fontWeight:700,color:col,lineHeight:1.3,zIndex:1}}>{layer.name.length>14?layer.name.slice(0,13)+"…":layer.name}</div>
                                  <div style={{fontSize:7,color:C.muted,zIndex:1,display:"flex",gap:4,flexWrap:"wrap"}}>
                                    {densOk!=null&&<span style={{color:densOk?C.green:C.amber}}>{densOk?"✓":"⚠"} ρ</span>}
                                    {est!=null&&<span style={{color:C.purple}}>{est}</span>}
                                    {actCont>0&&<span style={{color:C.green}}>({actCont})</span>}
                                    {subChecks.length>0&&<span style={{color:C.amber}}>{subChecks.length} checks</span>}
                                  </div>
                                </div>
                              );
                            })}
                            {layers.every(l=>nv(l.actualThick)===0&&nv(l.targetThick)===0)&&(
                              <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:C.dim,textAlign:"center",padding:12}}>Enter layer thicknesses</div>
                            )}
                          </div>
                        );
                      })()}
                      <div style={{width:100}}><svg width="100" height="30" viewBox="0 0 100 30"><path d="M0 30 Q50 0 100 30" fill="#111f35" stroke="#1e3a5f" strokeWidth="1.5"/>{hasBasket&&<rect x="38" y="10" width="24" height="20" fill="#f59e0b33" stroke={C.amber} strokeWidth="1" rx="2"/>}</svg></div>
                      <div style={{width:100,height:12,background:"#1e3a5f",border:`1px solid ${C.border}`,borderTop:"none",borderRadius:"0 0 4px 4px"}}/>
                      <div style={{width:28,height:10,background:"#1e3a5f",border:`1px solid ${C.border}`,borderTop:"none",borderRadius:"0 0 4px 4px"}}/>
                    </div>

                    {/* table */}
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:C.muted,marginBottom:10}}>Layer Summary</div>
                      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr",gap:3,padding:"4px 8px",marginBottom:4}}>
                        {["Layer","Material","Tgt H","Act H","Tgt ρ","Act ρ",`Est ${container==="drum"?"Dr":"Bg"}`,`Act ${container==="drum"?"Dr":"Bg"}`,`Final Outage (${U.sm})`,"Interim Checks"].map(h=>(
                          <div key={h} style={{fontSize:9,fontWeight:700,color:C.dim,letterSpacing:"0.06em",textTransform:"uppercase"}}>{h}</div>
                        ))}
                      </div>
                      {[...layers].reverse().map(layer=>{
                        const col=LC[layer.type];
                        const mat=getMat(layer.materialId);
                        const tgtD=nv(layer.targetDensity),actD=nv(layer.actualDensity);
                        const tgtT=nv(layer.targetThick),actT=nv(layer.actualThick);
                        const dVar=tgtD>0&&actD>0?((actD-tgtD)/tgtD*100):null;
                        const tVar=tgtT>0&&actT>0?((actT-tgtT)/tgtT*100):null;
                        const est=layerContainerEst(layer);
                        const actC=nv(layer.actualContainers);
                        return(
                          <div key={layer.id} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr",gap:3,padding:"6px 8px",borderRadius:6,marginBottom:4,background:C.panel,borderLeft:`3px solid ${col}`}}>
                            <div style={{fontSize:11,fontWeight:600,color:col,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{layer.name}</div>
                            <div style={{fontSize:10,color:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{mat?mat.name:"—"}</div>
                            <div style={{fontSize:11,color:C.text}}>{tgtT>0?fmt(tgtT):"—"}</div>
                            <div style={{fontSize:11,color:tVar!=null?(Math.abs(tVar)<5?C.green:C.amber):C.text}}>
                              {actT>0?fmt(actT):"—"}{tVar!=null&&<span style={{fontSize:9,marginLeft:2}}>{tVar>0?"+":""}{tVar.toFixed(1)}%</span>}
                            </div>
                            <div style={{fontSize:11,color:C.text}}>{tgtD>0?fmt(tgtD,0):"—"}</div>
                            <div style={{fontSize:11,color:dVar!=null?(Math.abs(dVar)<5?C.green:C.amber):C.text}}>
                              {actD>0?fmt(actD,0):"—"}{dVar!=null&&<span style={{fontSize:9,marginLeft:2}}>{dVar>0?"+":""}{dVar.toFixed(1)}%</span>}
                            </div>
                            <div style={{fontSize:13,fontWeight:800,color:C.purple}}>{est!=null?fmtI(est):"—"}</div>
                            <div style={{fontSize:13,fontWeight:800,color:C.green}}>{actC>0?fmtI(actC):"—"}</div>
                            <div style={{fontSize:11,color:C.amber,fontWeight:600}}>
                              {layer.finalOutage?`${layer.finalOutage} ${units==="si"?"cm":"in"}`:"—"}
                            </div>
                            <div style={{fontSize:11,color:C.muted}}>
                              {(layer.subOutages||[]).length>0
                                ?(layer.subOutages||[]).map(so=>`${so.drums||"?"}→${so.outage||"?"}${units==="si"?"cm":"in"}`).join(", ")
                                :"—"}
                            </div>
                          </div>
                        );
                      })}
                      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr",gap:3,padding:"8px 8px",borderRadius:6,background:"#0a1e3d",border:`1px solid ${C.border}`,marginTop:8,overflowX:"auto"}}>
                        <div style={{fontSize:11,fontWeight:700,color:C.accent}}>TOTAL</div><div/>
                        <div style={{fontSize:11,fontWeight:700,color:C.text}}>{totalTarget>0?fmt(totalTarget):"—"}</div>
                        <div style={{fontSize:11,fontWeight:700,color:C.accent}}>{totalActual>0?fmt(totalActual):"—"}</div>
                        <div/><div/>
                        <div style={{fontSize:13,fontWeight:800,color:C.purple}}>{totalEstContainers>0?fmtI(totalEstContainers):"—"}</div>
                        <div style={{fontSize:13,fontWeight:800,color:C.green}}>{totalActContainers>0?fmtI(totalActContainers):"—"}</div>
                      </div>
                      <div style={{marginTop:12,display:"flex",gap:8,flexWrap:"wrap"}}>
                        {Object.entries(LC).map(([type,col])=>(
                          <div key={type} style={{display:"flex",alignItems:"center",gap:4}}>
                            <div style={{width:9,height:9,borderRadius:2,background:col}}/><span style={{fontSize:9,color:C.muted}}>{LL[type]}</span>
                          </div>
                        ))}
                        <div style={{display:"flex",alignItems:"center",gap:4}}>
                          <span style={{fontSize:9,color:C.purple,fontWeight:700}}>Est.</span><span style={{fontSize:9,color:C.muted}}> / </span><span style={{fontSize:9,color:C.green,fontWeight:700}}>Act.</span><span style={{fontSize:9,color:C.muted}}> containers</span>
                        </div>
                      </div>
                    </div>
                  </div>
                </Card>
              </div>
            </div>
          )}

          {/* ══ REPORT ══ */}
          {tab==="report"&&(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
              <Card>
                <STitle color={C.green}>Report Information</STitle>
                <div style={{fontSize:11,color:C.muted,marginBottom:16,lineHeight:1.5}}>
                  Fill in the project details below. The report will combine these with all vessel geometry, materials, and bed configuration data you've entered throughout the app.
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  <div><Label>Customer / Company Name</Label><TxtInp value={rpCustomer} onChange={setRpCustomer} placeholder="e.g. Saudi Aramco"/></div>
